<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root{
    --deck:#10161a;
    --panel:#18222a;
    --panel-2:#1e2a33;
    --line:#2c3b45;
    --ink:#e6e9e4;
    --ink-dim:#8b9aa3;
    --amber:#f2a93b;
    --onspeed:#6fd08c;
    --caution:#d9695a;
    --display:"Oswald","Arial Narrow",Impact,sans-serif;
    --body:"IBM Plex Sans",system-ui,-apple-system,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--deck);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.55;
       -webkit-text-size-adjust:100%}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  textarea{font:inherit}

  /* ---------- shell ---------- */
  .shell{display:grid;grid-template-columns:340px 1fr;min-height:100vh}
  @media (max-width:900px){ .shell{grid-template-columns:1fr} .rail{border-right:none;border-bottom:1px solid var(--line)} }

  /* ---------- rail ---------- */
  .rail{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
  .rail-head{padding:22px 20px 16px;border-bottom:1px solid var(--line)}
  .tail{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--amber);text-transform:uppercase}
  h1{font-family:var(--display);font-weight:600;font-size:30px;letter-spacing:.06em;line-height:1;
     margin:8px 0 4px;text-transform:uppercase}
  .sub{font-size:12.5px;color:var(--ink-dim);margin:0}

  .gauge{margin-top:16px}
  .gauge-bar{height:6px;background:var(--panel-2);border:1px solid var(--line);position:relative;overflow:hidden}
  .gauge-fill{position:absolute;inset:0 auto 0 0;background:var(--onspeed);width:0;transition:width .35s ease}
  .gauge-txt{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;
             color:var(--ink-dim);margin-top:6px;letter-spacing:.06em}

  .rail-list{overflow-y:auto;flex:1;padding-bottom:20px}
  .phase-hd{display:flex;align-items:baseline;gap:8px;padding:20px 20px 8px;
            font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim)}
  .phase-hd .rule{flex:1;height:1px;background:var(--line)}

  .item{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;padding:9px 20px;
        border-left:2px solid transparent;transition:background .12s}
  .item:hover{background:var(--panel-2)}
  .item.on{background:var(--panel-2);border-left-color:var(--amber)}
  .item .idx{font-family:var(--mono);font-size:11px;color:var(--ink-dim);padding-top:3px;min-width:20px}
  .item .nm{flex:1;font-size:14px}
  .item.done .nm{color:var(--ink-dim)}
  .tick{width:14px;height:14px;border:1px solid var(--line);margin-top:4px;flex:none;position:relative}
  .item.done .tick{border-color:var(--onspeed);background:var(--onspeed)}
  .item.part .tick::after{content:"";position:absolute;inset:3px;background:var(--amber)}

  .rail-foot{border-top:1px solid var(--line);padding:12px 20px;display:flex;gap:10px;flex-wrap:wrap}
  .ghost{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
         color:var(--ink-dim);border:1px solid var(--line);padding:7px 11px}
  .ghost:hover{color:var(--ink);border-color:var(--amber)}

  /* ---------- lesson ---------- */
  .page{padding:34px 40px 90px;max-width:820px}
  @media (max-width:700px){ .page{padding:24px 20px 70px} }
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim)}
  h2{font-family:var(--display);font-weight:600;font-size:34px;letter-spacing:.03em;line-height:1.08;
     margin:6px 0 0;text-transform:uppercase}
  .badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
         color:var(--deck);background:var(--amber);padding:3px 7px;vertical-align:6px;margin-left:10px}

  .obj{border-left:2px solid var(--amber);padding:10px 0 10px 16px;margin:22px 0 6px}
  .obj .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber)}
  .obj p{margin:4px 0 0;font-size:17px}
  .why{color:var(--ink-dim);font-size:14.5px;margin:14px 0 0}

  h3{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);
     margin:34px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line)}

  .step{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;padding:9px 10px 9px 0}
  .step:hover .box{border-color:var(--amber)}
  .box{width:16px;height:16px;border:1px solid var(--line);flex:none;margin-top:3px;position:relative}
  .step.done .box{background:var(--onspeed);border-color:var(--onspeed)}
  .step.done .box::after{content:"";position:absolute;left:5px;top:1px;width:4px;height:9px;
                         border:solid var(--deck);border-width:0 2px 2px 0;transform:rotate(42deg)}
  .step.done .txt{color:var(--ink-dim);text-decoration:line-through;text-decoration-color:var(--line)}
  .txt{flex:1}

  .pitfall{display:flex;gap:10px;padding:7px 0;font-size:14.5px;color:var(--ink-dim)}
  .pitfall b{color:var(--caution);font-family:var(--mono);font-size:12px;flex:none}

  .check{border:1px solid var(--line);background:var(--panel);padding:16px 18px;margin-top:12px}
  .check .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--onspeed)}
  .check p{margin:6px 0 0}

  textarea{width:100%;min-height:150px;background:var(--panel);border:1px solid var(--line);color:var(--ink);
           padding:14px 16px;resize:vertical;line-height:1.6}
  textarea:focus{outline:none;border-color:var(--amber)}
  .hint{font-size:12.5px;color:var(--ink-dim);margin:8px 0 0}

  .nav{display:flex;justify-content:space-between;gap:12px;margin-top:46px;border-top:1px solid var(--line);padding-top:18px}

  /* ---------- diagram ---------- */
  .diag{border:1px solid var(--line);background:#0b1114;padding:10px;margin-top:8px}
  .hot{cursor:pointer}
  .hot circle{fill:var(--deck);stroke:var(--amber);stroke-width:1.5}
  .hot.filled circle{fill:var(--amber)}
  .hot text{fill:var(--amber);font-family:var(--mono);font-size:10px;text-anchor:middle}
  .hot.filled text{fill:var(--deck)}
  .hot:hover circle{stroke:var(--ink)}
  .zone{fill:none;stroke:var(--line);stroke-width:1}
  .glass{fill:none;stroke:var(--onspeed);stroke-width:1.2;opacity:.55}
  .diag-note{margin-top:12px;border:1px solid var(--line);padding:12px 14px;background:var(--panel)}
  .diag-note .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;color:var(--amber);text-transform:uppercase}
  .diag-note input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);
                   color:var(--ink);font:inherit;padding:6px 0;margin-top:6px}
  .diag-note input:focus{outline:none;border-color:var(--amber)}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--panel-2);
         border:1px solid var(--amber);color:var(--ink);font-family:var(--mono);font-size:12px;
         padding:10px 16px;opacity:0;pointer-events:none;transition:opacity .25s}
  .toast.up{opacity:1}

  .sheet{position:fixed;inset:0;background:rgba(6,10,12,.86);display:none;padding:40px 20px;overflow:auto;z-index:9}
  .sheet.up{display:block}
  .sheet-inner{max-width:820px;margin:0 auto;background:var(--panel);border:1px solid var(--line);padding:22px}
  .sheet pre{white-space:pre-wrap;font-family:var(--mono);font-size:12.5px;line-height:1.65;
             max-height:56vh;overflow:auto;background:var(--deck);border:1px solid var(--line);padding:16px;margin:14px 0}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="shell">
  <aside class="rail">
    <div class="rail-head">
      <div class="tail">VF—Tomcat · F-14B(U)</div>
      <h1>Carnet de<br>progression</h1>
      <p class="sub">Un parcours complet, de la mise en route au largage de JDAM. Coche, annote, imprime.</p>
      <div class="gauge">
        <div class="gauge-bar"><div class="gauge-fill" id="fill"></div></div>
        <div class="gauge-txt"><span id="pct">0 %</span><span id="cnt">0 / 0 étapes</span></div>
      </div>
    </div>
    <nav class="rail-list" id="rail"></nav>
    <div class="rail-foot">
      <button class="ghost" id="btn-md">Exporter en markdown</button>
      <button class="ghost" id="btn-reset">Réinitialiser</button>
    </div>
  </aside>
  <main id="main"><div class="page">Chargement…</div></main>
</div>

<div class="toast" id="toast"></div>
<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <div class="eyebrow">Markdown — copie tout, colle dans ton éditeur, imprime</div>
    <pre id="md"></pre>
    <div style="display:flex;gap:10px">
      <button class="ghost" id="btn-copy">Copier</button>
      <button class="ghost" id="btn-close">Fermer</button>
    </div>
  </div>
</div>

<script>
async function __sget(k){ try{ if(window.storage){const r=await window.storage.get(k); if(r) return r;} }catch(e){}
  try{const v=localStorage.getItem(k); return v?{value:v}:null;}catch(e){return null;} }
async function __sset(k,v){ try{ if(window.storage){await window.storage.set(k,v); return;} }catch(e){}
  try{localStorage.setItem(k,v);}catch(e){} }

/* ============================================================
   État : progression + notes, persistés
   ============================================================ */
const KEY = "f14bu-carnet";
let state = { steps:{}, notes:{}, labels:{} };
let current = 0;

async function load(){
  try{
    const r = await __sget(KEY);
    if(r && r.value) state = Object.assign(state, JSON.parse(r.value));
  }catch(e){ /* première ouverture ou stockage indisponible : on part à neuf */ }
}
let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{ await __sset(KEY, JSON.stringify(state)); }
    catch(e){ toast("Sauvegarde impossible — copie tes notes via l'export"); }
  }, 400);
}
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("up");
  setTimeout(()=>t.classList.remove("up"),2200);
}

const sKey=(l,i)=>l.id+":"+i;
const doneCount=l=>l.steps.filter((_,i)=>state.steps[sKey(l,i)]).length;
const totalSteps=()=>LESSONS.reduce((n,l)=>n+l.steps.length,0);
const doneTotal=()=>LESSONS.reduce((n,l)=>n+doneCount(l),0);

/* ============================================================
   Rendu
   ============================================================ */
function renderRail(){
  const rail=document.getElementById("rail");
  rail.innerHTML="";
  let phase=null, n=0;
  LESSONS.forEach((l,i)=>{
    if(l.phase!==phase){
      phase=l.phase;
      const h=document.createElement("div");
      h.className="phase-hd";
      h.innerHTML=`<span>${phase}</span><span class="rule"></span>`;
      rail.appendChild(h);
    }
    n++;
    const d=doneCount(l);
    const b=document.createElement("button");
    b.className="item"+(i===current?" on":"")+(d===l.steps.length?" done":(d>0?" part":""));
    b.innerHTML=`<span class="tick"></span><span class="idx">${String(n).padStart(2,"0")}</span><span class="nm">${l.title}</span>`;
    b.onclick=()=>{ current=i; render(); document.getElementById("main").scrollIntoView({block:"start"}); };
    rail.appendChild(b);
  });
  const tot=totalSteps(), dn=doneTotal(), pc=tot?Math.round(dn/tot*100):0;
  document.getElementById("fill").style.width=pc+"%";
  document.getElementById("pct").textContent=pc+" %";
  document.getElementById("cnt").textContent=`${dn} / ${tot} étapes`;
}

function diagramHTML(l){
  const d=DIAGRAMS[l.diagram];
  if(!d) return "";
  const spots=d.spots.map((s,i)=>{
    const filled=state.labels[l.diagram+":"+i]?" filled":"";
    return `<g class="hot${filled}" data-d="${l.diagram}" data-i="${i}" tabindex="0" role="button" aria-label="${s[2]}">
              <circle cx="${s[0]}" cy="${s[1]}" r="11"/>
              <text x="${s[0]}" y="${s[1]+4}">${i+1}</text></g>`;
  }).join("");
  const notes=d.spots.map((s,i)=>{
    const v=state.labels[l.diagram+":"+i]||"";
    return `<div class="diag-note"><div class="lbl">${i+1} · ${s[2]}</div>
            <input data-lab="${l.diagram}:${i}" value="${v.replace(/"/g,"&quot;")}"
                   placeholder="Ce que tu vois vraiment à cet endroit"></div>`;
  }).join("");
  return `<h3>${d.title}</h3><div class="diag">${d.svg.replace("HOTSPOTS",spots)}</div>
          <p class="hint">${d.hint}</p><div style="margin-top:10px">${notes}</div>`;
}

function render(){
  const l=LESSONS[current];
  const main=document.getElementById("main");
  main.innerHTML=`<div class="page">
    <div class="eyebrow">${l.phase}</div>
    <h2>${l.title}${l.isNew?'<span class="badge">Nouveau sur le B(U)</span>':""}</h2>

    <div class="obj"><div class="lbl">Objectif</div><p>${l.objective}</p></div>
    <p class="why">${l.why}</p>

    <h3>Étapes</h3>
    <div id="steps"></div>

    <h3>Pièges connus</h3>
    <div>${l.pitfalls.map(p=>`<div class="pitfall"><b>!</b><span>${p}</span></div>`).join("")}</div>

    <h3>Validation</h3>
    <div class="check"><div class="lbl">Tu passes à la suite quand</div><p>${l.checkride}</p></div>

    ${diagramHTML(l)}

    <h3>Tes notes</h3>
    <textarea id="note" placeholder="Procédure exacte, séquence de touches, réglages, ce qui t'a bloqué…">${(state.notes[l.id]||"").replace(/</g,"&lt;")}</textarea>
    <p class="hint">Écris ici ce que tu relèves dans le manuel Heatblur ou via le click-to-explain in-game. Tout est repris dans l'export markdown.</p>

    <div class="nav">
      <button class="ghost" id="prev" ${current===0?"disabled style=opacity:.3":""}>← Précédent</button>
      <button class="ghost" id="next" ${current===LESSONS.length-1?"disabled style=opacity:.3":""}>Suivant →</button>
    </div>
  </div>`;

  const sc=document.getElementById("steps");
  l.steps.forEach((s,i)=>{
    const b=document.createElement("button");
    b.className="step"+(state.steps[sKey(l,i)]?" done":"");
    b.innerHTML=`<span class="box"></span><span class="txt">${s}</span>`;
    b.setAttribute("aria-pressed", !!state.steps[sKey(l,i)]);
    b.onclick=()=>{ state.steps[sKey(l,i)]=!state.steps[sKey(l,i)]; save(); render(); };
    sc.appendChild(b);
  });

  const ta=document.getElementById("note");
  ta.oninput=()=>{ state.notes[l.id]=ta.value; save(); };

  main.querySelectorAll(".hot").forEach(g=>{
    const focusInput=()=>{
      const inp=main.querySelector(`[data-lab="${g.dataset.d}:${g.dataset.i}"]`);
      inp.focus(); inp.scrollIntoView({block:"center"});
    };
    g.onclick=focusInput;
    g.onkeydown=e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();focusInput();} };
  });
  main.querySelectorAll("[data-lab]").forEach(inp=>{
    inp.oninput=()=>{ state.labels[inp.dataset.lab]=inp.value; save(); };
    inp.onblur=()=>render();
  });

  const p=document.getElementById("prev"), nx=document.getElementById("next");
  if(current>0) p.onclick=()=>{current--;render();};
  if(current<LESSONS.length-1) nx.onclick=()=>{current++;render();};

  renderRail();
}

/* ============================================================
   Export markdown
   ============================================================ */
function markdown(){
  let out=`# F-14B(U) — carnet de progression\n\n`;
  out+=`Avancement : ${doneTotal()} / ${totalSteps()} étapes.\n\n---\n\n`;
  let phase=null;
  LESSONS.forEach(l=>{
    if(l.phase!==phase){ phase=l.phase; out+=`\n## ${phase}\n`; }
    out+=`\n### ${l.title}${l.isNew?" *(nouveau sur le B(U))*":""}\n\n`;
    out+=`**Objectif —** ${l.objective}\n\n${l.why}\n\n`;
    l.steps.forEach((s,i)=>{ out+=`- [${state.steps[sKey(l,i)]?"x":" "}] ${s}\n`; });
    out+=`\n**Pièges :**\n`; l.pitfalls.forEach(p=>out+=`- ${p}\n`);
    out+=`\n**Validation —** ${l.checkride}\n`;
    if(l.diagram){
      const d=DIAGRAMS[l.diagram];
      const lines=d.spots.map((s,i)=>{
        const v=state.labels[l.diagram+":"+i];
        return v?`- ${s[2]} : ${v}`:null;
      }).filter(Boolean);
      if(lines.length) out+=`\n**Schéma :**\n`+lines.join("\n")+"\n";
    }
    const n=state.notes[l.id];
    if(n && n.trim()) out+=`\n**Notes :**\n\n${n.trim()}\n`;
    out+=`\n`;
  });
  return out;
}

document.getElementById("btn-md").onclick=()=>{
  document.getElementById("md").textContent=markdown();
  document.getElementById("sheet").classList.add("up");
};
document.getElementById("btn-close").onclick=()=>document.getElementById("sheet").classList.remove("up");
document.getElementById("btn-copy").onclick=async()=>{
  try{ await navigator.clipboard.writeText(markdown()); toast("Markdown copié"); }
  catch(e){ toast("Sélectionne le texte et copie-le à la main"); }
};
document.getElementById("btn-reset").onclick=async()=>{
  if(!confirm("Effacer la progression, les notes et les annotations ?")) return;
  state={steps:{},notes:{},labels:{}};
  try{ await __sset(KEY, JSON.stringify(state)); }catch(e){}
  render(); toast("Carnet remis à zéro");
};
document.addEventListener("keydown",e=>{
  if(e.target.matches("textarea,input")) return;
  if(e.key==="ArrowRight"&&current<LESSONS.length-1){current++;render();}
  if(e.key==="ArrowLeft"&&current>0){current--;render();}
  if(e.key==="Escape") document.getElementById("sheet").classList.remove("up");
});

load().then(render);
</script>
