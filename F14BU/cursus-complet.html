<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cursus F-14B(U) — appli complète</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--deck:#10161a;--panel:#18222a;--panel-2:#1e2a33;--line:#2c3b45;--ink:#e6e9e4;--dim:#8b9aa3;--amber:#f2a93b;--go:#6fd08c;--warn:#d9695a;
    --display:"Oswald",sans-serif;--body:"IBM Plex Sans",system-ui,sans-serif;--mono:"IBM Plex Mono",monospace}
  *{box-sizing:border-box}
  body{margin:0;background:var(--deck);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.6}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  a{color:var(--amber)}
  .shell{display:grid;grid-template-columns:290px 1fr;min-height:100vh}
  @media(max-width:900px){.shell{grid-template-columns:1fr}}
  .rail{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
  .rail-head{padding:20px;border-bottom:1px solid var(--line)}
  .tail{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase}
  h1{font-family:var(--display);font-weight:600;font-size:26px;letter-spacing:.05em;line-height:1.05;margin:8px 0 6px;text-transform:uppercase}
  .sub{font-size:12.5px;color:var(--dim);margin:0}
  .rail-list{overflow-y:auto;flex:1;padding:8px 0 20px}
  .item{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;padding:10px 20px;border-left:2px solid transparent}
  .item:hover{background:var(--panel-2)}
  .item.on{background:var(--panel-2);border-left-color:var(--amber)}
  .item .idx{font-family:var(--mono);font-size:11px;color:var(--dim);padding-top:3px}
  .item .nm{flex:1;font-size:14px}
  .item.done .nm{color:var(--dim)} .item.done .idx{color:var(--go)}
  .rail-foot{border-top:1px solid var(--line);padding:12px 20px;font-size:12px;color:var(--dim)}
  .page{padding:34px 44px 90px;max-width:900px}
  @media(max-width:700px){.page{padding:22px 18px 70px}}
  .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}
  h2{font-family:var(--display);font-weight:600;font-size:33px;letter-spacing:.03em;line-height:1.1;margin:6px 0 0;text-transform:uppercase}
  .badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--deck);background:var(--amber);padding:3px 7px;vertical-align:6px;margin-left:10px}
  .intro{font-size:16px;margin:18px 0 0;border-left:2px solid var(--amber);padding-left:16px}
  h3{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin:38px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  p{margin:14px 0}
  figure{margin:20px 0;border:1px solid var(--line);background:#0b1114;padding:10px}
  figure img{width:100%;display:block;cursor:zoom-in;min-height:40px}
  figcaption{font-size:12.5px;color:var(--dim);margin-top:9px;display:flex;justify-content:space-between;gap:14px}
  figcaption a{font-family:var(--mono);font-size:11px;white-space:nowrap}
  .imgfail{display:none;padding:22px 14px;font-size:13px;color:var(--dim);text-align:center}
  figure.failed img{display:none} figure.failed .imgfail{display:block}
  ol.proc{list-style:none;counter-reset:s;padding:0;margin:16px 0}
  ol.proc li{counter-increment:s;display:flex;gap:14px;padding:10px 0;border-bottom:1px solid rgba(44,59,69,.5)}
  ol.proc li::before{content:counter(s,decimal-leading-zero);font-family:var(--mono);font-size:11px;color:var(--amber);padding-top:4px;min-width:22px}
  ol.proc b{color:var(--ink)}
  code{font-family:var(--mono);font-size:.92em;background:var(--panel-2);padding:2px 6px;border:1px solid var(--line);color:var(--amber)}
  .note{border:1px solid var(--line);background:var(--panel);padding:14px 16px;margin:18px 0}
  .note .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);display:block;margin-bottom:5px}
  .note.warn .lbl{color:var(--warn)} .note.go .lbl{color:var(--go)}
  .note p{margin:0}
  .keytbl{width:100%;border-collapse:collapse;margin:16px 0;font-size:13.5px}
  .keytbl th,.keytbl td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
  .keytbl th{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);background:var(--panel)}
  .keytbl td:first-child{font-family:var(--mono);white-space:nowrap}
  .srcs{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .srcs a{font-family:var(--mono);font-size:11px;border:1px solid var(--line);padding:7px 11px;text-decoration:none;color:var(--dim)}
  .srcs a:hover{color:var(--amber);border-color:var(--amber)}
  textarea{width:100%;min-height:130px;background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:13px 15px;resize:vertical;font:inherit;line-height:1.6}
  textarea:focus{outline:none;border-color:var(--amber)}
  .doneline{display:flex;align-items:center;gap:12px;margin-top:26px;border:1px solid var(--line);padding:14px 16px;background:var(--panel)}
  .doneline .box{width:18px;height:18px;border:1px solid var(--line);position:relative;flex:none}
  .doneline.on .box{background:var(--go);border-color:var(--go)}
  .doneline.on .box::after{content:"";position:absolute;left:6px;top:2px;width:4px;height:10px;border:solid var(--deck);border-width:0 2px 2px 0;transform:rotate(42deg)}
  .nav{display:flex;justify-content:space-between;gap:12px;margin-top:34px;border-top:1px solid var(--line);padding-top:18px}
  .ghost{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border:1px solid var(--line);padding:8px 12px}
  .ghost:hover{color:var(--ink);border-color:var(--amber)}
  .lb{position:fixed;inset:0;background:rgba(5,8,10,.94);display:none;align-items:center;justify-content:center;padding:24px;z-index:20;cursor:zoom-out}
  .lb.on{display:flex} .lb img{max-width:100%;max-height:100%}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px}
</style>
<style>
.phase-hd{display:flex;align-items:baseline;gap:8px;padding:18px 20px 6px;font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--amber)}
.phase-hd .rule{flex:1;height:1px;background:var(--line)}
.gauge-bar{height:6px;background:var(--panel-2);border:1px solid var(--line);position:relative;overflow:hidden;margin-top:14px}
.gauge-fill{position:absolute;inset:0 auto 0 0;background:var(--go);width:0;transition:width .35s}
.gauge-txt{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:6px}
.pat{border:1px solid var(--line);background:#0b1114;padding:16px;margin:20px 0}
.pat svg{width:100%;height:auto;display:block}
.pat .cap{font-size:12.5px;color:var(--dim);margin-top:10px}
</style>

</div>

async function __sget(k){ try{ if(window.storage){const r=await window.storage.get(k); if(r) return r;} }catch(e){}
  try{const v=localStorage.getItem(k); return v?{value:v}:null;}catch(e){return null;} }
async function __sset(k,v){ try{ if(window.storage){await window.storage.set(k,v); return;} }catch(e){}
  try{localStorage.setItem(k,v);}catch(e){} }

{id:"a1", title:"Tour du cockpit", isNew:true,
 intro:"Avant de toucher quoi que ce soit, il faut savoir où sont les choses. Le cockpit du B(U) garde l'ossature du Tomcat des années 70, avec trois écrans modernes greffés dessus. Cette leçon te donne la carte.",
 body:[
  {t:"h", v:"La vue d'ensemble"},
  {t:"p", v:"Le manuel découpe le poste pilote en douze zones. Tu n'as pas besoin des douze aujourd'hui : repère les blocs, pas les interrupteurs. La console gauche porte les manettes et tout ce qui touche à la propulsion et au carburant ; la planche de bord porte les instruments de vol ; la console droite porte l'électricité, l'éclairage et les radios."},
  {t:"img", k:"pilot", c:"Poste pilote du F-14B(U). Les zones numérotées correspondent aux chapitres du manuel."},
  {t:"note", k:"", lbl:"Ce qui a changé", v:"Trois éléments n'existaient pas sur le Tomcat d'origine : le HUD moderne (piloté par le VDIG-R), le PTID au centre, et le CDNU sur la console gauche. Si tu as un souvenir de l'ancien cockpit, c'est là que ton repère saute."},
  {t:"h", v:"Console gauche"},
  {t:"p", v:"C'est ta main gauche pendant tout le vol : manettes des gaz, balayage des ailes au pouce, aérofreins, gestion carburant, crosse d'appontage. Le CDNU (clavier de navigation) est la grosse nouveauté de cette zone."},
  {t:"img", k:"lconsole", c:"Console latérale gauche du pilote."},
  {t:"img", k:"cdnu", c:"CDNU — le clavier de navigation. Nouveau sur le B(U), il commande l'EGI et les waypoints."},
  {t:"h", v:"Planche de bord"},
  {t:"p", v:"Instruments de vol à gauche, écrans au centre, moteurs et systèmes à droite. Les instruments à aiguilles restent présents : ce sont eux qui te sauveront le jour où un écran tombe."},
  {t:"img", k:"lpanel", c:"Planche de bord gauche : badin, altimètre, ADI, variomètre, indexeur d'incidence."},
  {t:"img", k:"ptid", c:"PTID — l'écran tactique. Il remplace l'ancien TID."},
  {t:"img", k:"rpanel", c:"Planche de bord droite : paramètres moteurs, balayage des ailes, RWR, BDHI."},
  {t:"h", v:"Le siège arrière"},
  {t:"p", v:"Tu ne t'y assiéras probablement pas, mais tu dois savoir ce qu'il contient : c'est de là que JESTER travaille. Radar, navigation, désignation, contre-mesures — tout ce que tu lui demanderas se fait sur ces panneaux."},
  {t:"img", k:"rio", c:"Poste RIO du B(U). Le domaine de JESTER."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Mission d'entraînement, avion au parking, <b>moteurs coupés</b>. Pas de vol aujourd'hui.",
   "Ouvre le <b>manuel interactif in-game</b> et active le <b>click-to-explain</b> : survole un interrupteur, le jeu t'explique sa fonction. C'est la source la plus fiable qui existe pour ce module.",
   "Fais le tour dans l'ordre des planches ci-dessus : console gauche, planche de bord, console droite.",
   "Identifie et note l'emplacement de <b>douze commandes</b> : manettes, train, volets, aérofreins, crosse, freins, trim, balayage des ailes, master arm, HUD, PTID, CDNU.",
   "Referme tout, rouvre la mission, et retrouve les douze de mémoire."]},
  {t:"note", k:"go", lbl:"Validation", v:"Tu poses le curseur sur les douze commandes sans hésiter et sans relire tes notes."},
  {t:"src", v:["manuel","chuck2","manFR"]}
]},

{id:"a2", title:"Commandes et bindings",
 intro:"La moitié des vols ratés en reprise viennent d'un binding manquant découvert en l'air. Une heure au sol maintenant t'évite dix frustrations plus tard.",
 body:[
  {t:"h", v:"La manette : le vrai poste de commande"},
  {t:"p", v:"Sur Tomcat, la manette des gaz porte bien plus que la poussée. Le balayage des ailes se commande au pouce, les contre-mesures et plusieurs fonctions radar y sont aussi. C'est la pièce à cartographier en priorité sur ton HOTAS."},
  {t:"img", k:"throttle", c:"Manette des gaz et ses commandes secondaires."},
  {t:"h", v:"Les commandes de vol et de configuration"},
  {t:"img", k:"gear", c:"Panneau du train d'atterrissage, console verticale gauche."},
  {t:"img", k:"hook", c:"Commande de crosse d'appontage."},
  {t:"img", k:"wingsweep", c:"Indicateur de balayage des ailes : position commandée, position réelle, mode en cours."},
  {t:"note", k:"", lbl:"À savoir sur les ailes", v:"En mode AUTO, le calculateur d'air (CADC) place les ailes en fonction du Mach : environ 20° jusqu'à Mach 0,7, puis elles reculent progressivement jusqu'à 68° au-delà de Mach 1. Tu n'as normalement rien à faire. Le mode BOMB les fixe à 55° pour l'attaque au sol, et la poignée de secours sert au sur-balayage à 75° sur le pont.",},
  {t:"img", k:"launchbar", c:"Barre de lancement / abort — pour la catapulte, plus tard."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Ouvre les commandes DCS et binde le <b>vital</b> : train, volets, aérofreins, crosse, freins de roue, direction de roue avant, trim, postcombustion.",
   "Puis le <b>spécifique Tomcat</b> : balayage des ailes AVANT/ARRIÈRE au pouce, mode BOMB, verrière, éjection.",
   "Puis le <b>tactique</b> : désignation cible, sélection d'arme, largage de contre-mesures, menu JESTER et bouton contexte.",
   "Retourne dans le cockpit et <b>actionne chaque binding une fois</b>, en vérifiant l'effet à l'écran. Un binding non testé n'existe pas.",
   "Note ci-dessous ta liste finale : elle te servira de référence quand tu changeras de matériel."]},
  {t:"note", k:"warn", lbl:"Piège", v:"Le binding le plus souvent oublié est celui des contre-mesures. On s'en aperçoit toujours au premier missile."},
  {t:"src", v:["chuck1","manuel"]}
]},

{id:"a3", title:"Travailler avec JESTER",
 intro:"Le Tomcat est un avion à deux équipiers. Tu ne pilotes pas seul : tu commandes un équipage. Presque tout ce qui touche au radar, à la navigation et à la désignation passe par ton RIO.",
 body:[
  {t:"h", v:"Ce que JESTER fait pour toi"},
  {t:"p", v:"Il gère le radar (modes, portée, verrouillages), l'alignement de la navigation, la saisie des points, la nacelle de désignation, le datalink et les contre-mesures. Sur les tâches longues comme l'alignement de la centrale ou le démarrage, il peut même travailler pendant que tu observes — c'est une excellente façon d'apprendre une procédure avant de la faire soi-même."},
  {t:"img", k:"rio", c:"Le poste que JESTER occupe. Chaque commande que tu lui donnes se traduit par une action sur ces panneaux."},
  {t:"h", v:"Le bouton contexte", badge:true},
  {t:"p", v:"C'est l'apport de JESTER 2.0, hérité du Phantom. Au lieu de descendre trois niveaux de menu, il te propose directement l'action pertinente selon la phase de vol. En pratique, tu vas l'utiliser 80 % du temps et n'ouvrir le menu complet que pour les cas particuliers."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Avion au parking, moteurs coupés. Ouvre le menu JESTER et <b>parcours toute l'arborescence</b> sans rien déclencher.",
   "Note les trois ou quatre branches que tu utiliseras vraiment : radar, navigation, contre-mesures, communications.",
   "Teste le <b>bouton contexte</b> dans trois situations différentes : au sol moteurs coupés, au sol prêt à rouler, en vol. Observe qu'il ne propose pas la même chose.",
   "Demande-lui de faire le <b>démarrage complet</b> à ta place et regarde les interrupteurs bouger. C'est ta première leçon de démarrage, gratuite.",
   "Écris ton propre lexique : pour chaque besoin fréquent, la phrase JESTER exacte à viser."]},
  {t:"note", k:"warn", lbl:"Piège", v:"Croire que JESTER anticipe. Il est compétent mais il attend des ordres : si tu ne demandes rien, il ne fait rien d'utile au moment critique."},
  {t:"src", v:["chuck1"]}
]},

{id:"a4", title:"Démarrage à froid", isNew:true,
 intro:"Le démarrage n'est pas une corvée : c'est la séquence qui t'apprend l'architecture de l'avion. Électricité, puis air, puis moteurs, puis avionique. Une fois cette logique comprise, tu peux démarrer n'importe quel appareil.",
 body:[
  {t:"h", v:"L'ordre à retenir"},
  {t:"p", v:"Alimentation au sol ou APU pour avoir du courant. Air pour lancer les moteurs. Moteur droit puis moteur gauche. Génératrices en ligne. Avionique sous tension. Et surtout : <b>lancement de l'alignement de la navigation le plus tôt possible</b>, parce que c'est lui qui dicte l'heure à laquelle tu pourras rouler."},
  {t:"img", k:"lconsole", c:"Console gauche : c'est ici que se joue l'essentiel du démarrage."},
  {t:"img", k:"fuelpanel", c:"Panneau de gestion carburant."},
  {t:"h", v:"Surveiller les moteurs"},
  {t:"p", v:"Pendant le lancement, tu regardes trois choses : la montée du régime, la température, et la pression d'huile. Si l'une des trois ne se comporte pas comme prévu, tu coupes."},
  {t:"img", k:"lengine", c:"Paramètres moteur gauche."},
  {t:"img", k:"rengine", c:"Paramètres moteur droit."},
  {t:"img", k:"oil", c:"Pressions d'huile."},
  {t:"img", k:"hyd", c:"Pression hydraulique — à surveiller aussi, elle conditionne les commandes de vol."},
  {t:"h", v:"L'alignement de la navigation", badge:true},
  {t:"p", v:"Sur le B(U), l'alignement se suit au PTID. Deux points importants, hérités de l'architecture de l'avion et toujours vrais : la centrale a besoin du système d'armes, qui a lui-même besoin d'air de refroidissement prélevé sur les moteurs. Autrement dit, l'alignement <b>ne peut pas commencer avant que les moteurs tournent</b> et que le sélecteur d'air soit sur les deux moteurs. Et l'avion doit rester parfaitement immobile pendant toute la durée."},
  {t:"img", k:"ptidalign", c:"Suivi de l'alignement sur le PTID."},
  {t:"note", k:"", lbl:"Raccourci qui vaut le détour", v:"Demande à JESTER de lancer l'alignement et choisis la qualité voulue. Un alignement rapide suffit pour un vol d'entraînement ; l'alignement fin ne se justifie que si tu vas faire de la frappe sur coordonnées."},
  {t:"h", v:"Après démarrage"},
  {t:"p", v:"Il reste à configurer : écrans allumés, altimètre calé, gyro de secours érigé, radios et TACAN réglés, éclairage. Les checklists Minky de ton Drive donnent cette liste dans l'ordre — elles ont été écrites pour l'A/B, donc quelques repères d'écran diffèrent, mais l'ossature est la même."},
  {t:"img", k:"procov", c:"Vue d'ensemble des checklists normales, outil intégré au module."},
  {t:"img", k:"checklist", c:"La carte de checklist présente dans le cockpit."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Premier passage : laisse <b>JESTER démarrer</b> pendant que tu regardes. Ne touche à rien.",
   "Deuxième passage : démarre toi-même, manuel ouvert sur le second écran, sans chronomètre.",
   "Troisième passage : démarre en te chronométrant. Note le temps.",
   "Recommence jusqu'à ce que tu tombes sous les <b>8 minutes</b> de façon régulière.",
   "Écris ta séquence personnelle ci-dessous, dans tes mots — c'est ce que tu reliras dans trois semaines."]},
  {t:"note", k:"warn", lbl:"Pièges", v:"Lancer l'alignement trop tard : tu attends au point d'arrêt pour rien. Bouger l'avion pendant l'alignement : tu recommences."},
  {t:"note", k:"go", lbl:"Validation", v:"Démarrage complet en moins de 8 minutes, sans relire tes notes."},
  {t:"src", v:["chuck3","manuel","manFR"]}
]},

{id:"a5", title:"Roulage et décollage",
 intro:"On décolle d'une piste avant de toucher au porte-avions. Une variable difficile à la fois.",
 body:[
  {t:"h", v:"Avant de rouler"},
  {t:"p", v:"Trois réglages qui comptent : l'anti-dérapage et le frein aérodynamique en position terrain, le contournement de crosse sur FIELD (et non CARRIER), et le mode HUD sur décollage. La roulette avant se braque avec un bouton au manche ; un témoin te confirme qu'elle est engagée."},
  {t:"img", k:"procov", c:"Vue d'ensemble des checklists normales — les points de roulage y figurent."},
  {t:"h", v:"Rouler"},
  {t:"p", v:"L'avion est lourd et long. Tu anticipes tes virages, tu roules lentement, et tu freines par petites touches. Sur le pont d'un porte-avions plus tard, cette discipline sera la différence entre rester à bord et tomber à l'eau."},
  {t:"h", v:"Décoller"},
  {t:"p", v:"Configuration décollage, ailes en automatique, plein gaz ou postcombustion selon la masse. Tu tires doucement à la vitesse de rotation, tu rentres le train dès que le taux de montée est positif, puis tu nettoies la configuration. Les ailes se replient toutes seules quand la vitesse monte."},
  {t:"img", k:"gear", c:"Panneau de train."},
  {t:"img", k:"hudcruise", c:"Le HUD en croisière : vitesse, altitude, cap, vecteur vitesse."},
  {t:"note", k:"warn", lbl:"Pièges", v:"Cabrer trop tôt ou trop fort : le Tomcat frotte facilement la queue. Rentrer les volets trop bas ou trop lent."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Trois décollages consécutifs, même terrain, même masse de carburant.",
   "Le quatrième avec les réservoirs pleins : observe la différence de distance et d'assiette.",
   "Après chaque décollage, tour de piste et retour au parking. Tu travailles le roulage autant que le décollage.",
   "Note ci-dessous ta configuration et tes repères de rotation."]},
  {t:"note", k:"go", lbl:"Validation", v:"Trois décollages de suite, sans toucher la queue et sans sortir de l'axe."},
  {t:"src", v:["chuck3"]}
]},

{id:"a6", title:"Vol de base, AoA et DFCS", isNew:true,
 intro:"C'est la leçon la plus importante de la section. Le Tomcat se pilote à l'incidence, pas à la vitesse. Tout ce qui suivra — appontage, combat tournoyant, passes d'attaque — repose sur ce que tu vas sentir ici.",
 body:[
  {t:"h", v:"L'incidence commande tout"},
  {t:"p", v:"L'indexeur d'incidence, sur le montant gauche, te dit en un coup d'œil si tu es trop rapide, trop lent, ou dans le créneau. En approche, c'est lui que tu regardes, pas le badin : à masse variable, la bonne vitesse change, mais la bonne incidence, jamais."},
  {t:"img", k:"aoa", c:"Indexeur d'incidence : chevrons haut et bas, cercle au milieu. Le cercle, c'est le créneau."},
  {t:"img", k:"airspeed", c:"Badin — utile, mais secondaire par rapport à l'incidence en régime lent."},
  {t:"h", v:"Les instruments de tenue"},
  {t:"img", k:"adi", c:"ADI — assiette et inclinaison."},
  {t:"img", k:"vvi", c:"Variomètre."},
  {t:"img", k:"baroalt", c:"Altimètre barométrique."},
  {t:"img", k:"radalt", c:"Radioaltimètre — la vraie hauteur sol, indispensable en montagne et en attaque."},
  {t:"h", v:"Le DFCS", badge:true},
  {t:"p", v:"Le Tomcat d'origine avait une réputation méritée : sorties de contrôle brutales et vrilles difficiles à récupérer. Les commandes de vol numériques adoucissent nettement ce comportement — l'avion prévient mieux, décroche plus proprement, et pardonne des entrées que l'ancien ne pardonnait pas. Ce n'est pas une protection absolue : c'est une marge supplémentaire, pas un filet."},
  {t:"img", k:"csurf", c:"Indicateur de position des gouvernes — utile pour voir ce que le système fait réellement."},
  {t:"img", k:"vdicruise", c:"Le VDI en croisière."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Altitude de sécurité, 15 000 pieds minimum, zone dégagée.",
   "Virages soutenus à différents facteurs de charge, en tenant une <b>incidence constante</b>. Ne regarde pas le badin.",
   "Régimes lents : ralentis progressivement en configuration lisse, puis en configuration atterrissage. Sens où l'avion commence à prévenir.",
   "Approche du décrochage, en douceur, et récupération. Répète jusqu'à ce que ce ne soit plus une surprise.",
   "Enchaînements simples : virage inversé, montée en virage, descente à vitesse tenue.",
   "Teste l'autopilot et ses modes de tenue.",
   "Note tes repères : quelle incidence pour quoi, où l'avion commence à protester."]},
  {t:"note", k:"warn", lbl:"Pièges", v:"Piloter à la vitesse. Et croire que le DFCS te rend intouchable : il repousse la limite, il ne l'efface pas."},
  {t:"note", k:"go", lbl:"Validation", v:"Tu tiens un virage soutenu à incidence constante sans jamais regarder le badin."},
  {t:"src", v:["chuck4","manuel"]}
]},

{id:"a7", title:"Retour terrain et atterrissage",
 intro:"L'atterrissage terrain, c'est l'appontage sans la pression. Tout ce que tu construis ici sera réutilisé tel quel quand tu passeras au bateau.",
 body:[
  {t:"h", v:"La configuration"},
  {t:"p", v:"Train, volets, et la carte de checklist atterrissage du cockpit pour ne rien oublier. Crosse rentrée sur terrain, contournement de crosse sur FIELD, anti-dérapage actif — l'inverse exact de ce que tu feras au bateau."},
  {t:"img", k:"lndgchk", c:"Carte de checklist atterrissage, planche de bord gauche."},
  {t:"img", k:"gear", c:"Panneau de train."},
  {t:"h", v:"L'approche"},
  {t:"p", v:"Deux règles qui suffisent. L'assiette vise le point de toucher, la poussée règle le taux de descente. Et tu arrives <b>déjà stabilisé en incidence</b> avant le dernier virage : ce que tu n'as pas stabilisé en amont, tu ne le rattraperas pas en finale."},
  {t:"img", k:"aoa", c:"L'indexeur, de nouveau. En approche, c'est lui ton instrument principal."},
  {t:"img", k:"cautionlt", c:"Voyants d'alerte, montant gauche du pare-brise — un coup d'œil avant de sortir le train."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Circuit complet : vent arrière, base, finale. Cinq fois.",
   "Varie la masse de carburant : léger, moyen, lourd. Constate que la <b>vitesse</b> change et que l'<b>incidence</b> ne change pas.",
   "Fais trois remises de gaz volontaires : décision franche, plein gaz, pas d'hésitation. C'est le réflexe qui te sauvera au bateau.",
   "Termine par cinq approches d'affilée en tenant l'incidence à une demi-unité près.",
   "Note tes repères de circuit : altitudes, vitesses, points de virage."]},
  {t:"note", k:"warn", lbl:"Piège", v:"Approcher trop vite. C'est l'erreur la plus courante, et la seule qui soit vraiment punie au porte-avions."},
  {t:"note", k:"go", lbl:"Validation", v:"Cinq approches consécutives à l'incidence de référence, plus ou moins une demi-unité. Tu es prêt pour la section B."},
  {t:"src", v:["chuck3","manFR"]}
]}
]},

{id:"b1", title:"Comprendre le système", isNew:true,
 intro:"Avant de toucher au clavier, il faut comprendre ce qui a changé. Le B(U) ne modernise pas l'ancien système de navigation : il le remplace. Comprendre cette architecture t'évitera de chercher des commandes là où elles n'existent plus.",
 body:[
  {t:"h", v:"Du CAINS à l'EGI"},
  {t:"p", v:"L'ancien Tomcat naviguait à la centrale inertielle seule (CAINS), qui dérivait sur les longs vols. Le B(U) repose sur l'EGI : une centrale à gyrolaser couplée à un récepteur GPS. Un filtre combine les deux et donne une position qui, avec le GPS, ne dérive pratiquement plus. C'est ce qui rend possibles les frappes sur coordonnées de la section F."},
  {t:"img", k:"egischem", c:"Schéma du système EGI : centrale inertielle et GPS fusionnés."},
  {t:"note", k:"warn", lbl:"Le piège qui piège tout le monde", v:"Sur l'ancien F-14, tu saisissais les coordonnées au clavier CAP, à droite du siège RIO. Sur le B(U), le CAP existe encore mais <b>ne sert plus à la navigation</b> : ses fonctions nav ont été retirées ou réaffectées. Toute la saisie passe désormais par le CDNU. Si un vieux tutoriel te fait taper des points dans le CAP, il décrit l'ancien avion."},
  {t:"img", k:"cap", c:"Le CAP — toujours présent, mais retiré de la boucle de navigation sur le B(U)."},
  {t:"h", v:"Le CDNU : le nouveau centre de commande"},
  {t:"p", v:"Le CDNU (Control Display Navigation Unit) est sur la console gauche du RIO. C'est un petit écran à pages avec un clavier, exactement dans l'esprit d'une calculatrice de navigation d'avion de ligne. Tu y accèdes aux pages par des touches dédiées (FPLN, PROG, DIR, RNAV, IDX…) et tu valides tes saisies avec les touches latérales, les LSK, alignées de part et d'autre de l'écran."},
  {t:"img", k:"cdnu", c:"Le CDNU. À gauche et à droite de l'écran : les touches de sélection de ligne (LSK). En bas : le scratchpad."},
  {t:"note", k:"", lbl:"Le principe à retenir", v:"Tout se fait en deux temps. D'abord tu tapes ta donnée : elle apparaît dans le <b>scratchpad</b>, la ligne du bas entre crochets. Ensuite tu appuies sur la <b>LSK</b> en face du champ où tu veux la déposer. Taper puis déposer : c'est toute la logique du CDNU."},
  {t:"h", v:"Où lire la navigation"},
  {t:"p", v:"Le CDNU sert à saisir. Pour lire ta position dans le vol, tu as plusieurs écrans : le PTID côté tactique, le HSD (situation horizontale) et le HUD côté pilote, et le bon vieux BDHI à aiguilles. Le point actif de ta route apparaît sur le PTID sous forme d'un symbole en « os de chien »."},
  {t:"img", k:"navoverview", c:"Vue d'ensemble du système de navigation du B(U)."},
  {t:"img", k:"navpanels", c:"Les panneaux de navigation côté RIO."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Aucune manipulation. Cette leçon est de la lecture.",
   "Ouvre le CDNU en jeu et repère physiquement : l'écran, les LSK, le clavier alphanumérique, le scratchpad, les touches dédiées FPLN / PROG / DIR / RNAV / IDX.",
   "Appuie sur <code>MENU</code> pour voir la liste des fonctions, puis sur <code>IDX</code> pour voir la page d'index. Navigue sans rien saisir.",
   "Note ci-dessous, dans tes mots, la différence entre une touche dédiée, une LSK et le scratchpad."]},
  {t:"src", v:["manuel","chuck7"]}
]},

{id:"b2", title:"Aligner l'EGI", isNew:true,
 intro:"L'alignement est ce qui bloque tout démarrage : tant qu'il n'est pas fini, l'avion ne sait pas où il est et rien de tactique ne fonctionne. Bonne nouvelle : sur le B(U), c'est plus simple qu'avant, parce que le système choisit lui-même son mode d'alignement.",
 body:[
  {t:"h", v:"Le sélecteur qui commande tout"},
  {t:"p", v:"L'alignement se pilote avec le sélecteur NAV MODE sur le PTID. Dès que tu le sors de la position OFF, l'EGI démarre son alignement et choisit automatiquement le mode adapté selon ta situation : au sol frein serré, en mouvement, avec ou sans GPS. Tu n'as plus à sélectionner manuellement un mode d'alignement comme sur l'ancien avion."},
  {t:"img", k:"ptidalign", c:"Suivi de l'alignement sur le PTID."},
  {t:"table", head:["Position NAV MODE","Usage"], rows:[
    ["GND","Alignement au sol, à terre, avion immobile."],
    ["CV","Alignement sur porte-avions (tient compte du mouvement du pont)."],
    ["NAV","Position de vol normale, une fois l'alignement terminé."],
    ["OFF","Système éteint."]]},
  {t:"note", k:"warn", lbl:"La contrainte physique", v:"L'alignement a besoin du système d'armes, qui a besoin d'air de refroidissement prélevé sur les moteurs. Conséquence concrète : <b>les deux moteurs doivent tourner et le sélecteur d'air être sur les deux moteurs</b> avant que l'alignement puisse aboutir. C'est pour ça qu'on démarre les moteurs tôt. Et l'avion doit rester immobile au sol pendant toute la durée."},
  {t:"h", v:"Suivre la qualité"},
  {t:"p", v:"Sur la page START du CDNU (via IDX puis LSK1, puis flèche bas pour la page 2/2), tu lis la qualité d'alignement en milles nautiques par heure de dérive, le nombre de satellites captés, et la solution de position active : GPS, mélangée, ou inertielle seule. Plus la valeur de dérive est basse, meilleur est l'alignement. Pour un vol d'entraînement, tu n'as pas besoin d'attendre la perfection."},
  {t:"img", k:"egimodes", c:"Modes et états du système EGI."},
  {t:"img", k:"egidisp", c:"Affichages EGI sur le CDNU."},
  {t:"note", k:"", lbl:"Le raccourci JESTER", v:"Tu peux demander à JESTER de lancer et de gérer l'alignement, et choisir la qualité voulue. C'est parfait pour apprendre : tu le laisses faire une fois en observant la page START, puis tu refais toi-même."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Mission au sol, à terre. Démarre les moteurs (section A, leçon 4) et vérifie le sélecteur d'air sur les deux moteurs.",
   "Mets le sélecteur NAV MODE du PTID sur <code>GND</code>. L'alignement démarre.",
   "Ouvre la page START 2/2 du CDNU et <b>observe la dérive descendre</b> et les satellites se caler.",
   "Une fois l'alignement suffisant, passe le sélecteur sur <code>NAV</code>.",
   "Refais l'exercice sur un porte-avions avec la position <code>CV</code> et compare.",
   "Note le temps d'alignement réel et les valeurs de dérive que tu obtiens."]},
  {t:"note", k:"go", lbl:"Validation", v:"Tu lances un alignement complet, tu le suis sur la page START, et tu passes en NAV sans aide extérieure."},
  {t:"src", v:["manuel","chuck3"]}
]},

{id:"b3", title:"Saisir un waypoint", isNew:true,
 intro:"Le cœur de la section. Une fois que tu sais créer un point proprement, tu peux construire n'importe quelle route et, plus tard, guider une JDAM. La procédure est précise, mais courte une fois comprise.",
 body:[
  {t:"h", v:"Le format des coordonnées"},
  {t:"p", v:"Le CDNU attend des coordonnées en degrés et minutes décimales (DMM). Le format exact, sans aucun espace ni séparateur, est le suivant :"},
  {t:"note", k:"", lbl:"Format DMM", v:"<code>Nddmm.mmm Wdddmm.mmm</code> — soit N ou S, quatre chiffres (deux de degrés, deux de minutes), puis E ou W, cinq chiffres (trois de degrés, deux de minutes). Les décimales de minute sont optionnelles. Exemple réel tiré du manuel : <code>N4358.257W10700.347</code>."},
  {t:"note", k:"warn", lbl:"Les pièges de saisie", v:"<b>Zéros de tête obligatoires</b> : il n'y a pas de séparateur entre degrés et minutes, donc chaque chiffre compte. Pas d'espace, pas de « / », aucun caractère entre latitude et longitude. Une erreur d'un chiffre te déplace d'un kilomètre — ce qui, pour une JDAM, est un ratage complet."},
  {t:"img", k:"cdnu", c:"Le CDNU. Tu vas taper dans le scratchpad, puis déposer avec une LSK."},
  {t:"h", v:"Insérer le premier point d'une route vide"},
  {t:"p", v:"Quand la route est vide, la page FPLN affiche « End of Flight Plan ». Le premier point que tu insères devient le point actif."},
  {t:"proc", v:[
   "Appuie sur la touche dédiée <code>FPLN</code> pour afficher la page du plan de vol.",
   "Tape ta coordonnée au format DMM. Elle apparaît dans le <b>scratchpad</b> en bas.",
   "Vérifie-la caractère par caractère. C'est le moment de corriger, avec <code>CLR</code>.",
   "Appuie sur la <b>LSK gauche</b> en face de « End of Flight Plan ». Le point s'insère.",
   "En vol, le système demande confirmation (« CONFIRM FLT PLN CHG ») : réappuie sur la même LSK pour valider."]},
  {t:"img", k:"navmatrix", c:"Matrice des affichages de navigation : où ton point apparaît une fois saisi."},
  {t:"h", v:"Insérer un point au milieu d'une route"},
  {t:"proc", v:[
   "Page <code>FPLN</code>, tape la nouvelle coordonnée dans le scratchpad.",
   "Appuie sur la LSK du waypoint <b>devant lequel</b> tu veux insérer le nouveau. Il se glisse juste avant.",
   "Pour supprimer un point : tape un tiret <code>-</code> dans le scratchpad, puis appuie sur la LSK du point à effacer. Les suivants remontent."]},
  {t:"note", k:"", lbl:"Numérotation", v:"Les points préparés en mission portent les numéros 01 à 50. Ceux que tu crées en vol commencent à 51. Quand tu supprimes un point, les autres gardent leur numéro d'origine — l'ordre de vol, lui, est celui de la liste FPLN, pas celui des numéros."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Alignement fait, avion au sol. Ouvre la page <code>FPLN</code>.",
   "Crée un premier waypoint de zéro, à partir de coordonnées lues sur la carte F10 ou le kneeboard.",
   "Vérifie qu'il apparaît sur le PTID (symbole « os de chien ») et sur le HUD.",
   "Crée-en deux autres, puis intercale-en un au milieu, puis supprime-en un.",
   "Note ci-dessous la <b>séquence de touches exacte</b> — c'est le genre de chose qu'on oublie entre deux sessions, alors écris-la vraiment."]},
  {t:"note", k:"go", lbl:"Validation", v:"Tu crées un waypoint depuis une route vide en moins de 90 secondes, sans relire tes notes."},
  {t:"src", v:["manuel","chuck7"]}
]},

{id:"b4", title:"Suivre une route", isNew:true,
 intro:"Créer des points ne sert à rien si l'avion ne t'y emmène pas. Cette leçon relie ta route à ce que tu vois devant toi, et t'apprend à choisir comment l'avion enchaîne les points.",
 body:[
  {t:"h", v:"Les trois modes d'enchaînement"},
  {t:"p", v:"Sur la page FPLN, une LSK bascule le mode de séquencement du point actif. C'est ce qui décide comment l'avion passe d'un waypoint au suivant."},
  {t:"table", head:["Mode","Comportement"], rows:[
    ["AUTO","L'avion anticipe le virage vers le point suivant, façon navigation aérienne classique. Pratique en croisière — mais déconseillé en vol basse altitude, car il coupe les virages."],
    ["OFLY","L'avion vise le survol exact du point avant de séquencer. C'est le mode du vol tactique basse altitude, quand tu dois vraiment passer sur le point."],
    ["MAN","Aucun enchaînement automatique. Le guidage reste sur le point actif jusqu'à ce que tu avances manuellement avec la fonction DIR."]]},
  {t:"note", k:"warn", lbl:"À savoir", v:"Le mode AUTO « lisse » les virages pour rester dans un couloir aérien théorique. En basse altitude ou pour une frappe où le point compte vraiment, c'est OFLY qu'il te faut."},
  {t:"h", v:"Lire la route en vol"},
  {t:"p", v:"Le HSD, côté pilote, te donne la vue de dessus : cap commandé, écart de route, distance au point. La page PROG du CDNU, côté RIO, donne les chiffres : distance, temps au point, vitesse sol, dérive. Sur le HUD, le repère de direction t'amène au point actif."},
  {t:"img", k:"hsd", c:"Le HSD — situation horizontale, la vue de dessus de ta route."},
  {t:"img", k:"hudcruise", c:"Le HUD en croisière : suis le repère de direction vers le point actif."},
  {t:"img", k:"navdisplay", c:"Affichage de navigation côté RIO."},
  {t:"h", v:"Aller direct à un point"},
  {t:"p", v:"La touche DIR permet de sauter directement à un point de ta route, en laissant les points précédents passer dans l'historique. C'est ta commande de secours quand le plan change : un détour, une menace, une nouvelle cible."},
  {t:"proc", v:[
   "Appuie sur <code>DIR</code>.",
   "Fais défiler jusqu'au point voulu et sélectionne-le avec la LSK gauche.",
   "Ce point devient le point actif ; l'avion t'y emmène directement. Les points sautés passent dans l'historique (les cinq derniers restent rappelables)."]},
  {t:"h", v:"Marquer un point en vol"},
  {t:"p", v:"La touche MARK enregistre ta position actuelle : utile pour noter un objectif que tu viens de survoler. Le point atterrit dans le scratchpad, tu le ranges ensuite dans la liste MARK via la page IDX."},
  {t:"img", k:"mark", c:"Fonction MARK — enregistrer une position en vol."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Construis une route de quatre points (leçon B3).",
   "Vole-la en <code>AUTO</code>, puis recommence en <code>OFLY</code> : sens la différence dans les virages.",
   "En vol, survole un point d'intérêt et enregistre-le avec <code>MARK</code>.",
   "Utilise <code>DIR</code> pour sauter directement au dernier point, puis reviens au marqué.",
   "Exercice final : coupe le PTID et rentre au terrain au BDHI et au HSD seuls.",
   "Note tes repères de lecture : où tu regardes pour quoi."]},
  {t:"note", k:"go", lbl:"Validation", v:"Navigation de quatre points et retour au terrain, sans jamais ouvrir la carte F10."},
  {t:"src", v:["manuel","chuck7"]}
]},

{id:"b5", title:"TACAN et sources de guidage",
 intro:"Dernière brique : comprendre que plusieurs systèmes peuvent te guider en même temps, et savoir lequel écoute ton HUD. C'est la source de confusion classique — « pourquoi mon HUD ne pointe pas où je veux ? »",
 body:[
  {t:"h", v:"Quatre sources, une seule écoutée à la fois"},
  {t:"p", v:"Le B(U) a quatre sources de guidage : l'EGI (ta route CDNU), le calculateur de mission pour les modes d'attaque et de destination, le BDHI, et le TACAN. Le HUD et le HSD suivent l'une ou l'autre selon ce qui est sélectionné. La bascule principale se fait sur le panneau TACAN CMD, qui alterne entre <b>TACAN</b> et <b>EGI</b>."},
  {t:"img", k:"navoverview", c:"Le système de navigation et ses sources de guidage."},
  {t:"note", k:"", lbl:"La règle simple", v:"Si ton HUD ne t'emmène pas vers ton waypoint CDNU, vérifie d'abord le panneau TACAN CMD : il est probablement sur TACAN au lieu d'EGI. C'est l'explication dans neuf cas sur dix."},
  {t:"h", v:"Le TACAN"},
  {t:"p", v:"Le TACAN te guide vers une balise (une station sol, un porte-avions, un ravitailleur). Tu règles la fréquence sur le panneau TACAN, tu laisses chauffer, et le BDHI comme le HSD te donnent le cap et la distance vers la balise. C'est le même principe que sur l'ancien avion — cette partie n'a pas changé."},
  {t:"img", k:"tacan", c:"Panneau TACAN."},
  {t:"img", k:"bdhi", c:"Le BDHI — cap et distance, à aiguilles. Simple et increvable."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Règle un TACAN vers une balise sol et suis-la au BDHI jusqu'à la survoler.",
   "Bascule le panneau TACAN CMD entre <code>TACAN</code> et <code>EGI</code> et observe comment le HUD change de source.",
   "En fin de vol, règle le TACAN du porte-avions et sers-t'en pour rentrer vers le bateau — ça prépare la section C.",
   "Note tes fréquences TACAN utiles et le réflexe de vérification EGI/TACAN."]},
  {t:"note", k:"go", lbl:"Validation", v:"Tu sais dire, à tout instant, quelle source guide ton HUD — et la changer. Tu es prêt pour la section C."},
  {t:"src", v:["chuck7","manuel"]}
]}
]},

{id:"c1", title:"Départ catapulte",
 intro:"Le Tomcat est un avion embarqué : le porte-avions n'est pas un défi bonus, c'est son milieu naturel. On commence par en sortir, ce qui est bien plus facile que d'y revenir.",
 body:[
  {t:"h", v:"Rouler sur le pont"},
  {t:"p", v:"Le pont est encombré et se termine dans l'eau. Tu suis les directeurs (les marshallers), tu roules lentement, et tu gardes les ailes en sur-balayage à 75° tant que tu manœuvres au parking, pour ne pas accrocher un autre appareil."},
  {t:"img", k:"wingsweep", c:"Indicateur de balayage. Sur le pont, sur-balayage à 75° jusqu'à la mise en place."},
  {t:"h", v:"Se mettre en place"},
  {t:"p", v:"Une fois aligné sur la catapulte, tu déploies la barre de lancement et tu passes en configuration décollage : ailes sorties à 20°, volets et becs sortis, trim réglé. Le contournement de crosse doit être sur CARRIER."},
  {t:"img", k:"launchbar", c:"Commande de barre de lancement et bouton d'abandon."},
  {t:"img", k:"gear", c:"Panneau de train — la barre de lancement se gère depuis cette zone."},
  {t:"h", v:"Le coup de catapulte"},
  {t:"proc", v:[
   "Plein gaz, voire postcombustion selon la masse et le vent sur le pont.",
   "Passe rapidement les commandes en revue : gouvernes libres, paramètres moteurs verts.",
   "Salut au directeur pour signaler que tu es prêt.",
   "<b>Mains à l'écart du manche</b> pendant le lancement. Le Tomcat rote pratiquement tout seul.",
   "Après le catapultage : rotation naturelle, train rentré dès taux de montée positif, puis nettoyage de la configuration."]},
  {t:"note", k:"warn", lbl:"Pièges", v:"Toucher le manche pendant le lancement : tu induis une oscillation dangereuse à basse hauteur. Et décoller trop lourd pour le vent du jour : vérifie ta masse contre les conditions."},
  {t:"img", k:"hudcruise", c:"Le HUD une fois en montée."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Mission au départ catapulte. Trois catapultages consécutifs, sans intervention hasardeuse au manche.",
   "Un quatrième réservoirs pleins : observe la différence de comportement en sortie.",
   "Note ta configuration de décollage et ton repère de rotation."]},
  {t:"note", k:"go", lbl:"Validation", v:"Trois catapultages de suite, mains propres, sans oscillation."},
  {t:"src", v:["chuck3","manuel"]}
]},

{id:"c2", title:"La théorie de l'appontage",
 intro:"Avant de tourner autour du bateau, il faut comprendre ce qu'on cherche à faire. L'appontage n'est pas un atterrissage précis : c'est trois paramètres tenus simultanément jusqu'au fil d'arrêt. Cette leçon est de la lecture — la pratique vient après.",
 body:[
  {t:"h", v:"Les trois paramètres"},
  {t:"p", v:"Tout l'appontage tient dans un balayage permanent entre trois choses : la <b>boule</b> (ton plan de descente, lue sur le miroir optique du bateau), l'<b>alignement</b> (rester dans l'axe de la piste oblique, qui se dérobe puisque le bateau avance), et l'<b>incidence</b> (l'AoA, ta vitesse d'approche). Tu ne fixes jamais un seul des trois : tu balaies les trois en boucle."},
  {t:"img", k:"aoa", c:"L'indexeur d'incidence. En approche bateau, c'est un de tes trois yeux."},
  {t:"note", k:"", lbl:"Le mantra", v:"« Meatball, lineup, angle of attack » — boule, axe, incidence. Répété en boucle à voix haute, ça t'empêche de te fixer sur un seul paramètre et d'oublier les deux autres."},
  {t:"h", v:"Le DLC : la commande secrète du Tomcat", badge:true},
  {t:"p", v:"Le Tomcat a une commande que peu d'avions possèdent : le DLC (Direct Lift Control), une molette au pouce qui te fait monter ou descendre sur le plan <b>sans changer d'assiette</b>. Le manuel est catégorique : toutes les approches devraient se faire DLC engagé — sans lui, la tenue du plan se dégrade nettement. Tu l'engages une fois les volets complètement sortis, jamais pendant le cycle des volets."},
  {t:"note", k:"warn", lbl:"Discipline moteur", v:"Les F110 répondent vite et fort. Le manuel insiste : évite de sur-contrôler la poussée. Petites corrections, jamais de grands coups de manette. La sensibilité de la manette est ton pire ennemi les premières fois."},
  {t:"h", v:"Le circuit CASE I en chiffres"},
  {t:"pat", v:PATTERN_SVG, cap:"Circuit visuel CASE I. Les valeurs sont celles du manuel Heatblur ; elles te donnent des repères, pas une contrainte au pied près."},
  {t:"table", head:["Étape","Repères du manuel"], rows:[
    ["Break","800 ft, 300 à 350 kt. Intervalle d'environ la moitié du temps souhaité entre deux appareils."],
    ["Vent arrière","Descente et stabilisation à 600 ft. Ralentir à 15 unités d'incidence (ou vitesse on-speed). Sortir train, volets, becs, crosse. Engager le DLC une fois les volets sortis."],
    ["Le 180","Amorcé à 1 à 1,2 nm par le travers de la plateforme LSO. Inclinaison de 27 à 28°."],
    ["Le 90","Arrivée vers 450 à 500 ft."],
    ["Acquisition de la boule","Vers 0,6 nm. Ne pas descendre sous 300 ft avant d'avoir la boule."],
    ["Dans l'axe (groove)","Temps optimal sur le plan : 15 à 18 secondes."]]},
  {t:"note", k:"", lbl:"Configuration de référence", v:"Le bateau attend un Tomcat en config standard : ailes à 20°, volets et becs sortis. Toute autre configuration doit être signalée au LSO, car elle change les conditions de vent sur le pont."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Rien à piloter. Lis cette leçon deux fois.",
   "Regarde une vidéo d'appontage en gardant les trois paramètres en tête : repère la boule, l'axe, l'indexeur.",
   "Récite le circuit CASE I dans l'ordre, avec ses chiffres, jusqu'à le connaître.",
   "Note ci-dessous, dans tes mots, ce que fait le DLC et pourquoi il change tout."]},
  {t:"note", k:"go", lbl:"Validation", v:"Tu peux réciter le circuit CASE I et expliquer les trois paramètres sans relire."},
  {t:"src", v:["manuel","chuck7"]}
]},

{id:"c3", title:"Voler le circuit",
 intro:"Maintenant tu voles ce que tu viens d'apprendre. On construit le circuit morceau par morceau, sans chercher à réussir l'appontage du premier coup — l'objectif ici, c'est d'arriver dans l'axe, stabilisé, à la bonne incidence.",
 body:[
  {t:"h", v:"La configuration, dans l'ordre"},
  {t:"p", v:"Le point qui sauve tout : tu arrives dans le dernier virage <b>déjà stabilisé en incidence</b>. Ce que tu n'as pas stabilisé en vent arrière et dans le 180, tu ne le rattraperas jamais dans l'axe. La configuration se fait donc entièrement avant le 90."},
  {t:"img", k:"lndgchk", c:"Carte de checklist atterrissage, à compléter avant le 180."},
  {t:"img", k:"hook", c:"Crosse d'appontage — sortie en vent arrière."},
  {t:"img", k:"gear", c:"Train et volets."},
  {t:"h", v:"Tenir l'incidence à la manette"},
  {t:"p", v:"En approche, la logique s'inverse par rapport au vol normal : l'assiette vise l'axe, et c'est la <b>poussée qui règle le plan de descente</b> (aidée du DLC). Tu ne piques pas pour descendre : tu réduis un cheveu de poussée ou tu donnes une touche de DLC vers le bas. Corrections petites et permanentes."},
  {t:"img", k:"vdicruise", c:"Le VDI — repère de plan et d'assiette en approche."},
  {t:"note", k:"warn", lbl:"L'erreur numéro un", v:"Arriver trop vite. C'est la seule erreur vraiment punie au bateau : trop rapide, la crosse rebondit sur les brins ou tu passes au-dessus. L'incidence, pas la vitesse."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Mission avec le bateau, météo calme, avion léger (peu de carburant). On simplifie tout au début.",
   "Vole le circuit complet mais <b>vise juste l'arrivée dans l'axe</b>, stabilisé, à 15 unités d'incidence. Ne cherche pas encore le brin.",
   "Remets les gaz volontairement à chaque passage : tu travailles l'approche, pas le toucher.",
   "Recommence jusqu'à arriver dans l'axe stabilisé de façon régulière.",
   "Note tes repères réels : à quelle vitesse tu passes chaque étape, où tu amorces le 180."]},
  {t:"note", k:"go", lbl:"Validation", v:"Tu arrives dans l'axe, dans le groove, stabilisé en incidence, cinq fois de suite — sans forcément apponter."},
  {t:"src", v:["manuel","chuck7"]}
]},

{id:"c4", title:"Poser sur le pont",
 intro:"La dernière marche. Tu ajoutes le toucher à ce que tu maîtrises déjà. Il n'y a pas de raccourci ici : seulement du volume. Vingt appontages ratés valent mieux qu'un tutoriel de plus.",
 body:[
  {t:"h", v:"Le balayage final"},
  {t:"p", v:"Dans l'axe, tu balaies en boucle : boule, axe, incidence. Corrections minuscules. Si la boule descend, une touche de poussée et de DLC vers le haut. Si tu dérives, une petite correction d'axe au manche, accompagnée d'un léger palonnier pour contrer le lacet. Jamais de grand geste."},
  {t:"note", k:"", lbl:"Le geste qui compte", v:"Au toucher : <b>plein gaz militaire systématique</b>. Tu remets les gaz à chaque fois, avant même de savoir si tu as accroché un brin. Si la crosse tient, l'avion s'arrête ; si elle rebondit, tu es déjà en train de redécoller. Ce réflexe est non négociable — c'est lui qui transforme un raté en simple remise de gaz. Sélectionner la pleine poussée coupe aussi automatiquement le DLC et rentre les aérofreins."},
  {t:"img", k:"csurf", c:"Position des gouvernes — utile pour voir tes propres entrées en finale."},
  {t:"note", k:"warn", lbl:"Deux pièges mortels", v:"Piquer du nez juste avant le toucher : tu augmentes fortement le risque de rebond de crosse. Et vouloir casser un fort taux de chute au manche seul près du ramp : tu abîmes l'arrière de l'avion. Un taux de chute se casse à la poussée et au DLC, pas à l'assiette."},
  {t:"h", v:"Après le toucher"},
  {t:"p", v:"Si tu accroches : plein gaz maintenu, manche légèrement tiré, tu laisses les brins t'arrêter. Une fois immobilisé, tu réduis, tu remontes la crosse sur ordre, et tu dégages le pont vers un parking en suivant les directeurs. Si tu rebondis (bolter) : tu es déjà à fond, tu redécolles, et tu reprends le circuit pour un nouveau passage."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Reprends la mission de la leçon C3, toujours en météo calme.",
   "Cette fois, va au bout : cherche le brin. Plein gaz au toucher, à chaque passage.",
   "Compte tes réussites sur dix. Ne vise pas la perfection : vise la progression.",
   "Quand tu passes cinq sur dix, complique : plus de carburant, mer formée, pont qui bouge.",
   "Note après chaque série : qu'est-ce qui t'a fait rater ? Boule, axe, ou incidence ?"]},
  {t:"note", k:"go", lbl:"Validation", v:"Cinq appontages réussis sur dix en conditions calmes, puis huit sur dix. Tu tiens le bateau — le reste du module s'ouvre à toi."},
  {t:"src", v:["manuel","chuck7"]}
]}
]},

{id:"d1", title:"Le radar : modes et vocabulaire",
 intro:"Le Tomcat est un intercepteur avant d'être un chasseur : le radar est l'arme principale, le missile n'est que la conséquence. Cette leçon te donne le vocabulaire qui te servira dans toutes les suivantes.",
 body:[
  {t:"h", v:"Deux familles, un compromis"},
  {t:"p", v:"L'AN/AWG-9 fonctionne en pulse ou en pulse doppler. Le pulse voit dans toutes les directions, même une cible qui te fait face à vitesse nulle relative, mais il se noie dans le fouillis au sol et porte moins loin. Le pulse doppler porte beaucoup plus loin en se filtrant sur la vitesse relative de la cible — au prix d'un angle mort sur les cibles qui n'ont presque pas de vitesse de rapprochement (le fameux « notch »)."},
  {t:"table", head:["Mode","Fonction","Portée typique"], rows:[
   ["Recherche pulse","Recherche moyenne portée, secondaire air-sol.","60 nm"],
   ["Poursuite pulse (P-STT)","Poursuite ferme courte-moyenne portée.","50 nm"],
   ["Recherche pulse doppler","Recherche longue portée.","110 nm"],
   ["Recherche avec télémétrie","Recherche longue portée avec distance.","90 nm"],
   ["Poursuite sur passage (TWS)","Longue portée, plusieurs pistes, guidage AIM-54.","90 nm"],
   ["Poursuite doppler (PD STT)","Poursuite ferme longue portée, tous les missiles.","90 nm"]]},
  {t:"note", k:"", lbl:"Ce que ça veut dire pour toi", v:"En pratique tu vivras surtout dans deux modes : <b>TWS</b> pour surveiller et engager plusieurs pistes à la fois avec le Phoenix, et <b>PD STT</b> quand tu dois verrouiller fermement une cible pour un Sparrow, un Sidewinder guidé, ou un tir canon assisté."},
  {t:"h", v:"Le panneau qui commande tout"},
  {t:"p", v:"Le DDD, côté RIO, concentre les réglages : taille de cible attendue (petite/normale/grande — ça change la portée d'activation du missile), filtrage du fouillis, gain, et surtout les <b>voyants de poursuite</b> : ANT TRK (l'antenne suit l'angle), RDROT (la cible est dans la porte de distance), qui te disent si ton verrouillage est solide ou fragile."},
  {t:"img", k:"ddd", c:"Le DDD — panneau de contrôle radar principal côté RIO."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Mission d'entraînement avec quelques appareils neutres à détecter, sans tirer.",
   "Passe en recherche pulse doppler, repère un contact, note son comportement sur le DDD.",
   "Fais-le passer en poursuite (STT) et observe les voyants ANT TRK et RDROT s'allumer.",
   "Repasse en TWS et regarde plusieurs pistes coexister.",
   "Note le vocabulaire dans tes mots : recherche, poursuite, TWS, STT."]},
  {t:"note", k:"go", lbl:"Validation", v:"Tu détectes, poursuis et identifies un contact à 40 nm sans stress, et tu sais dire dans quel mode tu es."},
  {t:"src", v:["manuel","chuck9"]}
]},

{id:"d2", title:"Lire le PTID", isNew:true,
 intro:"Le PTID remplace l'ancien TID. Il est plus riche mais il faut réapprendre où regarder. C'est ton centre de conscience tactique pour tout le reste de la section.",
 body:[
  {t:"h", v:"Ce qui a changé"},
  {t:"p", v:"Le PTID reproduit les fonctions de l'ancien TID, mais les fonctions se sélectionnent désormais par des boutons-poussoirs autour de l'écran plutôt que par des commandes physiques séparées. Menus, échelle, désencombrement — tout passe par ces boutons numérotés."},
  {t:"img", k:"ptidcenter", c:"Le PTID et sa console. Sélecteur NAV MODE à gauche, boutons de fonction tout autour de l'écran."},
  {t:"h", v:"Les boutons qui comptent"},
  {t:"table", head:["Bouton","Fonction"], rows:[
   ["RANGE","Échelle de l'écran — le diamètre affiché correspond à la distance sélectionnée."],
   ["MENU","Ouvre le menu complet du PTID."],
   ["CLSN","Direction de collision vers la piste suivie ou le centre du groupe en TWS."],
   ["THLD","Rétention de piste prolongée — deux minutes au lieu de 14 secondes environ."],
   ["Zone de tir","Affiche les zones de tir missile, activées automatiquement 60 secondes avant la portée maximale."],
   ["Désencombrement","Bascule altitude numérique, symboles secondaires, pistes datalink, pistes non engageables."]]},
  {t:"h", v:"Piste brute et piste ferme"},
  {t:"p", v:"C'est la distinction qui décide si tu peux tirer. Une piste brute est un simple contact détecté — pas encore assez de données pour un tir guidé. Une piste ferme, en poursuite (STT) ou en TWS établi, porte les informations de vecteur et de distance nécessaires au calcul de zone de tir."},
  {t:"img", k:"ptid", c:"Vue d'ensemble du PTID."},
  {t:"img", k:"ptidsys", c:"Affichages système du PTID."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Ouvre le PTID en vol, avec des contacts présents.",
   "Change l'échelle avec RANGE et observe l'effet.",
   "Active puis désactive chaque option de désencombrement une par une : regarde ce que chacune ajoute ou retire.",
   "Identifie une piste brute puis fais-la passer en piste ferme.",
   "Note ce que tu vois réellement dans ton cockpit, avec tes propres mots — les libellés exacts peuvent différer légèrement de ce texte."]},
  {t:"note", k:"go", lbl:"Validation", v:"Tu énonces la situation tactique du PTID en cinq secondes de lecture, sans hésiter sur les boutons."},
  {t:"src", v:["manuel"]}
]},

{id:"d3", title:"Le HUD en air-air",
 intro:"Le nouveau HUD te permet de rester tête haute pendant tout l'engagement, là où l'ancien t'obligeait à plonger dans les instruments. Cette leçon relie ce que tu vois dehors à ce qui se passe sur ton radar.",
 body:[
  {t:"h", v:"Les invariants"},
  {t:"p", v:"Vitesse, altitude, cap, vecteur vitesse et assiette restent affichés en permanence, comme en vol normal. Ce qui change en mode air-air, c'est la symbologie de tir qui vient se superposer : losange de cible désignée, distance, Rmin et Rmax (les bornes de la zone de tir), et l'indication de zone de lancement qui s'allume automatiquement en approche de portée."},
  {t:"img", k:"hudcruise", c:"Le HUD hors mode armement. En A/A, la symbologie de tir vient s'ajouter par-dessus cette base."},
  {t:"h", v:"Le losange et le réticule"},
  {t:"p", v:"Pour le canon et l'AIM-9, deux repères travaillent ensemble : le <b>losange</b> indique la cible verrouillée par le radar, et le <b>réticule</b> (pipper) indique où va réellement le tir, une fois la solution de tête calculée. Ce n'est qu'avec un verrouillage radar que tu obtiens les deux ; sans lock, tu n'as que le réticule brut."},
  {t:"img", k:"vdicruise", c:"Écran vertical — répète une partie de la symbologie du HUD, utile en secours."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Verrouille un contact ami en poursuite ferme et observe le losange apparaître au HUD.",
   "Rapproche-toi et regarde Rmin/Rmax évoluer ainsi que l'indication de zone de tir s'activer.",
   "Vole une interception complète en ne regardant que le HUD, du contact radar jusqu'au passage."]},
  {t:"note", k:"go", lbl:"Validation", v:"Interception complète tête haute, sans regarder la planche de bord."},
  {t:"src", v:["manuel"]}
]},

{id:"d4", title:"Sidewinder et canon",
 intro:"On commence par les armes les plus simples : autonomes après le déclenchement, sans guidage à tenir. C'est là qu'on apprend les bases de la solution de tir avant de compliquer avec les missiles radar.",
 body:[
  {t:"h", v:"Préparer l'AIM-9"},
  {t:"p", v:"Le refroidissement du viseur infrarouge doit être activé avant tir — il devient prêt immédiatement mais met environ 60 secondes à atteindre sa pleine performance. Une fois prêt, le mode normal (SEAM) laisse le viseur balayer autour de ta ligne de visée ou de ta cible verrouillée, dans un champ de 40° ; le mode boresight le fige strictement sur l'axe de l'avion, en 2,5° seulement."},
  {t:"img", k:"armpanel", c:"Panneau d'armement — préparation missile et sélection."},
  {t:"img", k:"stbyrdy", c:"Légende des voyants d'état missile : en attente, prêt."},
  {t:"note", k:"", lbl:"Le son qui te guide", v:"Un grondement grave signifie que le viseur balaie sans trouver de source infrarouge. Un sifflement aigu signifie qu'il regarde une source chaude. C'est ce sifflement que tu attends avant de presser la détente."},
  {t:"h", v:"Le canon"},
  {t:"p", v:"Sans verrouillage radar, tu n'as que le réticule brut : pas de portée, seulement une solution de tête. Avec un verrouillage — même bref — tu obtiens portée, vitesse de rapprochement et solution complète. Rafales courtes : les munitions sont limitées."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Active le refroidissement AIM-9, attends la pleine performance.",
   "Trois tirs sur cible non manœuvrante en mode SEAM, à courte distance.",
   "Trois tirs sur cible manœuvrante — sens la différence de fenêtre de tir.",
   "Passe au canon : un engagement sans verrouillage radar, un autre avec.",
   "Note tes distances de tir réussies pour chaque arme."]},
  {t:"note", k:"go", lbl:"Validation", v:"Trois cibles abattues consécutivement, au moins une au canon."},
  {t:"src", v:["chuck6","manuel"]}
]},

{id:"d5", title:"Sparrow",
 intro:"Le Sparrow t'oblige à tenir ton verrouillage pendant tout le vol du missile. C'est l'école de la discipline de tir : rien n'est automatique après le départ.",
 body:[
  {t:"h", v:"Le principe du guidage semi-actif"},
  {t:"p", v:"Le Sparrow ne « voit » pas sa cible : il suit l'énergie radar que ton avion réfléchit dessus. Concrètement, ça veut dire que <b>ton radar doit rester verrouillé sur la cible jusqu'à l'impact</b>. Si tu romps le lock, le missile perd son guidage et devient inutile."},
  {t:"h", v:"Deux modes"},
  {t:"p", v:"En mode normal, avec un verrouillage ferme (STT), le WCS peut guider en continu ou en pulse doppler selon le modèle de missile. En mode boresight, le radar illumine simplement tout ce qui se trouve dans l'axe — utile en dernier recours si le verrouillage se perd, car le radar bascule automatiquement sur ce mode quand la cible est perdue, te laissant une chance de repêcher le tir."},
  {t:"img", k:"acm", c:"Panneau ACM — modes de tir rapproché et boresight."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Verrouillage ferme sur une cible, vérifie le domaine de tir affiché au HUD (Rmin/Rmax).",
   "Tire, et <b>maintiens le verrouillage</b> pendant tout le vol du missile — ne romps rien, ne désengage rien.",
   "Recommence sur une cible manœuvrante : sens à quel point il est facile de perdre le lock en la suivant.",
   "Exercice : deux tirs successifs sur deux cibles séparées, en changeant de verrouillage entre les deux.",
   "Note ta portée de tir réussie et ce qui t'a fait perdre le lock, le cas échéant."]},
  {t:"note", k:"warn", lbl:"Piège", v:"Manœuvrer trop fort juste après le tir : tu perds l'antenne sur la cible et le missile part pour rien."},
  {t:"note", k:"go", lbl:"Validation", v:"Deux tirs sur trois au but, sur cible manœuvrante."},
  {t:"src", v:["manuel"]}
]},

{id:"d6", title:"Phoenix et tir multi-cibles", isNew:true,
 intro:"L'arme qui rend le Tomcat unique : tirer loin, sur plusieurs cibles, avant même d'être vu. C'est aussi l'arme la plus longue à préparer et la plus facile à gâcher si on la tire trop tôt.",
 body:[
  {t:"h", v:"Portées réelles"},
  {t:"p", v:"Contre une cible de la taille d'un chasseur, en altitude et en poursuite doppler ferme, compte au moins 60 nm de portée. En TWS contre plusieurs cibles à la fois, ça descend vers 50 nm. Si tu tires en mode actif d'entrée (le missile cherchant seul dès le départ), la portée s'effondre à environ 10 nm — c'est un mode de dernier recours, pas une tactique standard."},
  {t:"h", v:"Préparation"},
  {t:"p", v:"Comme le Sparrow, le Phoenix doit être préparé et accordé avant tir — environ deux minutes pour que les voyants de statut passent à « prêt ». Ne néglige pas ce délai dans ta planification d'engagement."},
  {t:"img", k:"weapons", c:"Vue d'ensemble de l'armement — les Phoenix sur leurs rails fuselage."},
  {t:"h", v:"Le principe du guidage"},
  {t:"p", v:"En TWS, jusqu'à six Phoenix peuvent être guidés simultanément vers six cibles différentes. Le missile part semi-actif — guidé par ton radar — puis bascule en <b>autonome</b> (guidage radar actif embarqué) une fois assez proche de sa cible. Ce basculement n'est pas automatique dans l'absolu : c'est ton radar qui commande le passage en mode actif. Si ce signal n'arrive jamais, le missile continue en semi-actif jusqu'au bout — ce qui veut dire qu'il n'est <b>pas vraiment « tire et oublie »</b> tant qu'il n'a pas basculé."},
  {t:"note", k:"", lbl:"Ce que ça implique pour toi", v:"Tu dois garder ta piste TWS active jusqu'à ce que le missile devienne autonome, pas juste jusqu'au moment du tir. Rompre le suivi trop tôt prive le missile de ses mises à jour de trajectoire."},
  {t:"h", v:"Tir multi-cibles"},
  {t:"p", v:"En TWS, tu assignes un missile à chaque piste voulue, tu tires en séquence, et tu maintiens le tableau de pistes actif pendant que les missiles convergent. C'est la manœuvre signature du Tomcat : rester en dehors de portée adverse tout en engageant plusieurs appareils."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Prépare tes Phoenix (deux minutes d'avance sur ton engagement prévu).",
   "Tir sur cible unique à longue distance, en gardant le suivi radar actif jusqu'à l'impact.",
   "Passe en TWS avec deux ou trois cibles, assigne et tire en séquence.",
   "Note tes portées réelles observées — elles varient nettement avec l'altitude, la vitesse de tir et la manœuvre de la cible."]},
  {t:"note", k:"warn", lbl:"Piège", v:"Tirer au maximum théorique sur une cible manœuvrante : elle a largement le temps de se dérober avant l'impact. Réserve les longues portées aux cibles qui ne savent pas qu'elles sont visées."},
  {t:"note", k:"go", lbl:"Validation", v:"Deux cibles engagées simultanément en TWS, au moins une abattue."},
  {t:"src", v:["manuel","chuck9"]}
]},

{id:"d7", title:"BFM : le Tomcat au manche",
 intro:"Dernière leçon de la section : le combat tournoyant. Le Tomcat est lourd mais ses ailes immenses le rendent redoutable à basse vitesse — à condition de ne pas gaspiller son énergie dans le premier virage.",
 body:[
  {t:"h", v:"Gérer l'énergie"},
  {t:"p", v:"Chaque virage soutenu coûte de la vitesse. La question permanente en combat tournoyant n'est pas « puis-je tourner plus fort » mais « ai-je les moyens de le faire maintenant ». Le DFCS (section A) t'aide à sentir la limite, mais l'énergie, elle, ne se récupère qu'en ligne droite ou en piqué."},
  {t:"img", k:"csurf", c:"Position des gouvernes — utile pour voir tes propres entrées en combat."},
  {t:"img", k:"aoa", c:"L'indexeur d'incidence — ton limiteur de virage en combat serré, comme en approche."},
  {t:"h", v:"Manœuvres de base"},
  {t:"p", v:"Le virage soutenu à facteur de charge constant est ta manœuvre par défaut. Le tonneau barriqué casse une poursuite en te déplaçant latéralement sans perdre trop d'énergie. La mise en travers extrême réduit ta vitesse brutalement pour faire dépasser un poursuivant — dangereux si mal jugé, redoutable sinon."},
  {t:"h", v:"Défensif"},
  {t:"p", v:"En défensif, ton premier travail est de détecter la menace le plus tôt possible — c'est pour ça que le RWR (section E) et le fait de regarder dehors comptent autant que le pilotage. Une fois la menace identifiée, casse la solution de tir adverse par un virage franc vers elle, pas en t'éloignant."},
  {t:"img", k:"rwr", c:"Détecteur d'alerte radar — ta première ligne de défense en combat."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Combat contre un adversaire de niveau facile, en offensif : garde l'énergie, ne tire pas sur le manche au premier virage.",
   "Même exercice en défensif : détecte, réagis, casse la solution.",
   "Combat contre un adversaire plus manœuvrant : accepte de perdre longtemps avant de trouver ton ouverture.",
   "Note ce qui t'a coûté le plus d'énergie, et à quel moment tu aurais dû rompre plutôt qu'insister."]},
  {t:"note", k:"go", lbl:"Validation", v:"Tu tiens deux minutes en défensif face à un adversaire plus manœuvrant sans être abattu. Tu es prêt pour la section E."},
  {t:"src", v:["chuck6","manuel"]}
]}
]},

{id:"e1", title:"Lire le RWR",
 intro:"Le détecteur d'alerte radar (ALR-67) est ta première ligne de défense : il te dit qui t'illumine, d'où, et avec quelle intention. Savoir le lire en un coup d'œil vaut tous les leurres du monde.",
 body:[
  {t:"h", v:"Ce que l'écran te dit"},
  {t:"p", v:"Chaque symbole représente un émetteur radar : sa position sur l'écran donne sa direction relative, son symbole donne son type. La distance au centre reflète la priorité de la menace, pas la distance réelle. Sur le B(U), l'affichage ECM passe par le PMDIG (l'écran de contre-mesures), avec une option de bascule automatique : dès qu'une menace apparaît, la page ECM peut prendre le dessus sur ce qui était affiché."},
  {t:"img", k:"ecmd", c:"L'écran de contre-mesures (ECMD), console verticale droite du RIO."},
  {t:"img", k:"ecmdPm", c:"L'ECMD au sein du groupe d'écrans programmables du B(U)."},
  {t:"h", v:"Trois niveaux d'urgence"},
  {t:"table", head:["Signal","Sens","Ta réaction"], rows:[
   ["Recherche","Un radar balaie ta zone, sans te suivre.","Noter la direction, continuer la mission."],
   ["Poursuite","Un radar te suit spécifiquement.","Préparer une réaction : cap, altitude, programme de leurres."],
   ["Tir / guidage","Un missile est probablement en vol vers toi.","Réagir immédiatement : manœuvre + leurres. C'est maintenant."]]},
  {t:"img", k:"rwrRio", c:"Panneau de commande du RWR côté RIO : alimentation, type de menaces affichées, volume."},
  {t:"img", k:"rwrPlt", c:"Répétiteur RWR côté pilote."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Mission avec des radars sol actifs mais hors de portée de tir. Survole la zone en écoutant et regardant le RWR.",
   "Associe chaque son à ce que tu vois à l'écran : recherche, poursuite, tir.",
   "Règle le volume pour que l'alerte de tir soit impossible à rater sans que la recherche te fatigue.",
   "Note les symboles des menaces de ta mission et leur signification."]},
  {t:"note", k:"go", lbl:"Validation", v:"Tu identifies le type et la direction d'une menace au son, avant même de regarder l'écran."},
  {t:"src", v:["manuel","chuck6b"]}
]},

{id:"e2", title:"L'ALE-47 : leurres programmés", isNew:true,
 intro:"Le B(U) remplace l'ancien système de contre-mesures par l'AN/ALE-47, programmable. La différence de philosophie est totale : tu ne largues plus au hasard sous le stress, tu déclenches des programmes préparés à froid.",
 body:[
  {t:"h", v:"Ce qui a changé"},
  {t:"p", v:"L'ALE-47 se pilote via deux panneaux sur la console droite du RIO : l'unité d'affichage (DCDU) et le programmateur. Les programmes de largage — combien de paillettes ou de fusées, à quelle cadence, sur quelle durée — peuvent être préparés avant le vol, y compris chargés depuis l'éditeur de mission via la cartouche de données (MDL), la même qui transporte tes plans de vol."},
  {t:"img", k:"rconsole", c:"Console droite du RIO — les panneaux ALE-47 (DCDU et programmateur) s'y trouvent."},
  {t:"img", k:"decm", c:"Panneau DECM — le brouilleur, complémentaire des leurres."},
  {t:"h", v:"Trois programmes types à préparer"},
  {t:"table", head:["Situation","Logique du programme"], rows:[
   ["Missile radar","Paillettes en salve, cadence rapide, couplées à une manœuvre dans le plan horizontal pour sortir du filtrage doppler."],
   ["Missile infrarouge","Fusées espacées sur plusieurs secondes, le temps de casser l'accrochage pendant que tu changes de vecteur."],
   ["Dégagement","Programme mixte plus long, pour couvrir une sortie de zone défendue."]]},
  {t:"note", k:"", lbl:"Le principe qui rend tout efficace", v:"Un leurre sans manœuvre ne sauve presque jamais. Le programme donne au missile un faux choix ; c'est ta manœuvre qui rend le mauvais choix crédible. Les deux ensemble, toujours."},
  {t:"h", v:"Côté déclenchement"},
  {t:"p", v:"Les commandes de largage restent accessibles aux deux équipiers : le pilote a son bouton de contre-mesures (celui que tu as bindé en section A), et le RIO ses interrupteurs — largage unitaire ou lancement du programme sélectionné. En pratique avec JESTER, tu déclenches toi-même et il gère la sélection des programmes si tu le lui demandes."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Au sol, explore le DCDU et le programmateur ALE-47 avec le click-to-explain : identifie où se lisent les quantités restantes et le programme sélectionné.",
   "Prépare (ou fais préparer via l'éditeur de mission) tes trois programmes types.",
   "En vol, déclenche chaque programme à blanc et vérifie ce qui sort : type, cadence, durée.",
   "Note tes programmes ci-dessous : contenu exact et situation d'emploi. C'est ta carte de survie personnelle."]},
  {t:"note", k:"warn", lbl:"Piège", v:"Vider tout son stock sur la première alerte. Les leurres sont une ressource de mission : un programme adapté en consomme peu et en garde pour le retour."},
  {t:"note", k:"go", lbl:"Validation", v:"Tu connais tes trois programmes par cœur et tu sais lequel déclencher sans réfléchir."},
  {t:"src", v:["manuel"]}
]},

{id:"e3", title:"Survivre à un engagement",
 intro:"La leçon de synthèse : tout mettre ensemble sous pression. Détection, décision, manœuvre, leurres — dans cet ordre, en quelques secondes.",
 body:[
  {t:"h", v:"La séquence de survie"},
  {t:"proc", v:[
   "<b>Détecter</b> : l'alerte RWR ou le départ missile vu dehors. Chaque seconde d'avance compte double.",
   "<b>Annoncer et localiser</b> : d'où vient la menace ? Le RWR te donne l'azimut ; tes yeux confirment.",
   "<b>Manœuvrer</b> : virage franc pour mettre la menace sur le travers (radar) ou casser la ligne de vue (IR), en jouant l'altitude si le terrain le permet.",
   "<b>Leurrer</b> : le bon programme, pendant la manœuvre, pas après.",
   "<b>Réévaluer</b> : la menace a-t-elle décroché ? Sinon, on recommence. Si oui, on sort de la zone — on ne retourne pas voir."]},
  {t:"img", k:"caution", c:"Voyants d'alerte du pare-brise — après un engagement, un coup d'œil pour vérifier que l'avion n'a rien pris."},
  {t:"note", k:"", lbl:"Radar contre infrarouge", v:"Contre un missile radar, ta manœuvre vise à réduire ta vitesse relative vue du radar (le mettre sur le travers) pendant que les paillettes lui offrent une cible alternative. Contre un missile infrarouge, tout est dans la ligne de vue : fusées + changement de plan brutal pour sortir du champ du chercheur."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Mission : traverser une zone défendue par un ou deux systèmes sol-air de menace moyenne, aller-retour.",
   "Premier passage haut et prudent : repère les menaces au RWR sans t'exposer.",
   "Deuxième passage dans l'enveloppe : laisse-toi engager volontairement et déroule la séquence complète.",
   "Répète jusqu'à sortir intact trois fois de suite.",
   "Note ce qui t'a surpris et le délai réel entre l'alerte et ta réaction."]},
  {t:"note", k:"go", lbl:"Validation", v:"Trois traversées de zone défendue, engagé à chaque fois, intact à chaque fois. Direction la section F : rendre les coups."},
  {t:"src", v:["manuel","chuck6b"]}
]}
]},
