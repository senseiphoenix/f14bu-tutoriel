{id:"f1", title:"Bombes lisses et symbologie A/G", isNew:true,
 intro:"On valide la nouvelle symbologie air-sol du HUD sur l'arme la plus simple. Une bombe non guidée qui touche, c'est la preuve que tu comprends la passe d'attaque — le reste n'est que du raffinement.",
 body:[
  {t:"h", v:"Configuration"},
  {t:"p", v:"Sélection de l'arme et paramètres de largage sur le panneau d'armement, master arm en dernier. Le mode BOMB du balayage des ailes (section A) fixe les ailes à 55° pour stabiliser la plateforme en passe d'attaque."},
  {t:"img", k:"stores", c:"Vue d'ensemble des emports."},
  {t:"img", k:"armpanel", c:"Panneau d'armement — sélection et paramètres."},
  {t:"h", v:"Deux logiques de largage"},
  {t:"table", head:["Logique","Principe","Quand"], rows:[
   ["Point d'impact continu","Le HUD affiche en permanence où tomberait la bombe si tu larguais maintenant. Tu amènes le repère sur la cible et tu presses.","Cible visible, passe en piqué. Le mode de l'apprentissage."],
   ["Point calculé","Tu désignes la cible d'abord ; l'avion largue seul au bon moment pendant que tu voles le profil.","Largage en palier ou en ressource, cible désignée."]]},
  {t:"img", k:"hud", c:"Le HUD — en mode A/G, la symbologie de largage s'ajoute par-dessus cette base."},
  {t:"img", k:"radalt", c:"Le radioaltimètre — ta vraie hauteur sol en passe d'attaque. Règle un plancher d'alerte."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Mission avec cibles au sol non défendues. Configure une paire de bombes lisses.",
   "Passe en piqué à 30° environ : point de roulis, mise en piqué, repère sur la cible, largage, ressource franche.",
   "Cinq passes. Note ton altitude de largage et ta hauteur de ressource au radioaltimètre.",
   "Puis trois passes au point calculé : désigne, vole le profil, laisse l'avion larguer.",
   "Note tes paramètres de passe qui fonctionnent : angle, vitesse, altitude d'entrée et de largage."]},
  {t:"note", k:"warn", lbl:"Pièges", v:"Descendre trop bas et se faire prendre par sa propre explosion. Et fixer la cible au point d'oublier la ressource — le sol gagne toujours."},
  {t:"note", k:"go", lbl:"Validation", v:"Trois bombes sur cinq à moins de 50 m de la cible."},
  {t:"src", v:["manuel","chuck6"]}
]},

{id:"f2", title:"Bombes guidées laser et LANTIRN",
 intro:"La frappe de précision classique du Tomcat : la nacelle LANTIRN, tenue par ton RIO, illumine la cible et la bombe suit le point laser. Ta partie : voler le profil. Celle de JESTER : trouver, désigner, illuminer.",
 body:[
  {t:"h", v:"Mise en œuvre de la nacelle"},
  {t:"p", v:"La nacelle demande de l'anticipation : alimentation au sol, puis environ huit minutes de refroidissement avant d'être opérationnelle. Ensuite : mode opérationnel, laser armé, et vérification du code laser — il doit correspondre à celui réglé sur tes bombes (1688 par défaut dans la plupart des missions)."},
  {t:"img", k:"lgbcues", c:"Symbologie LANTIRN typique pour un largage de bombe guidée laser : temps avant largage, temps avant impact, distance oblique."},
  {t:"h", v:"Le partage des rôles avec JESTER"},
  {t:"proc", v:[
   "Tu amènes l'avion vers la zone ; JESTER pointe la nacelle — sur un waypoint proche de la cible si tu en as créé un (section B), sinon devant le nez de l'avion.",
   "JESTER cherche, trouve, et accroche la cible en suivi.",
   "Tu voles la passe : le HUD et le PTID affichent le compte à rebours de largage (TREL).",
   "Au signal, largage. La nacelle illumine — en automatique dans les dernières secondes du vol de la bombe, ou en manuel sur ta demande.",
   "Après largage : vole doux et ne masque pas la ligne de vue de la nacelle vers la cible, jusqu'à l'impact."]},
  {t:"note", k:"warn", lbl:"Pièges", v:"Illuminer trop tôt (la bombe plonge court en épuisant son énergie) ou masquer le laser en manœuvrant fort après le largage. La bombe suit le point laser : pas de point, pas d'impact."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Crée un waypoint sur ta cible avant le vol (section B) : le pointage de la nacelle en devient trivial.",
   "Première attaque complète sur cible fixe, en laissant JESTER tout gérer côté capteur.",
   "Deuxième attaque sur cible mobile : la nacelle suit, à toi de tenir un profil stable.",
   "Note ton enchaînement JESTER exact — c'est la procédure la plus dépendante des menus, écris-la."]},
  {t:"note", k:"go", lbl:"Validation", v:"Deux cibles détruites en une passe chacune, dont une mobile."},
  {t:"src", v:["chuck9","manuel"]}
]},

{id:"f3", title:"JDAM : frapper des coordonnées", isNew:true,
 intro:"La capacité entièrement nouvelle du B(U), celle qui justifie à elle seule l'upgrade. Aucune image, aucun laser : des coordonnées, ton EGI, et une bombe qui plane vers le point. Tout ce que tu as appris en section B converge ici.",
 body:[
  {t:"h", v:"La chaîne complète"},
  {t:"p", v:"Coordonnées de cible → système de navigation → transfert à la bombe → largage dans le domaine → guidage GPS autonome. Aucun maillon n'est visuel. C'est pour ça que la précision de saisie (section B, leçon 3) est vitale : la bombe ira exactement où tu as dit, y compris si tu as dit faux."},
  {t:"img", k:"ggwcues", c:"Symbologie typique d'un largage d'arme guidée GPS (GGW) : point de largage, domaine, temps."},
  {t:"h", v:"Programmer une cible depuis le CDNU"},
  {t:"p", v:"Le chemin le plus propre passe par le plan de vol : chaque waypoint peut devenir une cible JDAM. Sur la page d'édition du waypoint (page 2/2), tu choisis la station d'emport (3, 4, 5 ou 6) puis tu transfères les données du point vers la bombe de cette station. La vérification se fait sur la page mission JDAM du PTID (JMSN)."},
  {t:"proc", v:[
   "Saisis ou vérifie le waypoint-cible : coordonnées <b>exactes</b>, format DMM, et surtout l'<b>altitude</b> du point — une JDAM guide en trois dimensions.",
   "Ouvre la page d'édition du waypoint, seconde page.",
   "Sélectionne la station d'emport voulue (rotation 3/4/5/6).",
   "Transfère les données vers la station : le point devient la cible principale de cette bombe.",
   "Vérifie sur la page <code>JMSN</code> du PTID que chaque station a bien sa cible.",
   "Des missions pré-planifiées peuvent aussi être chargées entières depuis la cartouche de données (MDL), préparées dans l'éditeur de mission."]},
  {t:"img", k:"cdnu", c:"Le CDNU — la page d'édition de waypoint est la porte d'entrée du ciblage JDAM."},
  {t:"img", k:"ptid", c:"Le PTID — la page JMSN te montre l'assignation cibles/stations."},
  {t:"note", k:"", lbl:"Coordonnées haute précision", v:"Pour une frappe sérieuse, utilise la page d'édition haute précision (touche <code>F3</code> du CDNU) : elle accepte les coordonnées au dix-millième de minute ou au centième de seconde, en DMM ou DMS. C'est là que tu saisis des coordonnées relevées sur la carte F10 en format fin."},
  {t:"h", v:"Le largage"},
  {t:"p", v:"La JDAM plane, mais pas indéfiniment : son domaine dépend de ton altitude et de ta vitesse au largage. Plus haut et plus vite = plus loin. Le HUD t'affiche le domaine et le point de largage ; tu voles vers la zone, master arm, et tu largues dans le domaine. Ensuite la bombe est autonome — tu peux dégager immédiatement."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Une cible, une bombe : chaîne complète du relevé de coordonnées à l'impact, par tous les temps — essaie de nuit ou dans les nuages, c'est là que la JDAM prend son sens.",
   "Vérifie deux fois chaque coordonnée avant transfert. Prends-en l'habitude dès maintenant.",
   "Puis la frappe multiple : quatre points, quatre bombes, quatre stations, un seul passage.",
   "Note ta procédure complète ci-dessous — c'est la plus longue du module, et celle que tu oublieras le plus vite sans notes."]},
  {t:"note", k:"warn", lbl:"Pièges", v:"Une erreur d'un chiffre dans les coordonnées : un kilomètre d'écart. Une altitude de cible fausse ou nulle : la bombe rate en trois dimensions. Un largage hors domaine : la bombe tombe court, proprement, inutilement."},
  {t:"note", k:"go", lbl:"Validation", v:"Quatre points frappés en un seul passage, sans visuel sur aucune cible. Le B(U) n'a plus de secret offensif pour toi."},
  {t:"src", v:["manuel"]}
]}
]},

{id:"g1", title:"Urgences",
 intro:"Un avion endommagé qui rentre vaut mieux qu'un avion perdu — et savoir quand s'éjecter fait partie du métier. On ne mémorise pas tout : on mémorise les réflexes immédiats, le reste se lit sur la checklist.",
 body:[
  {t:"h", v:"La règle des trois temps"},
  {t:"p", v:"Toute urgence se traite en trois temps : <b>piloter</b> d'abord (l'avion vole encore, garde-le en vol), <b>identifier</b> ensuite (quel voyant, quel paramètre, quel moteur), <b>agir</b> enfin (les réflexes immédiats, puis la checklist). L'erreur classique est d'inverser : se jeter sur les interrupteurs pendant que l'avion part en vrille."},
  {t:"img", k:"caution", c:"Voyants d'alerte du pare-brise — ta première information dans la plupart des pannes."},
  {t:"h", v:"Panne moteur"},
  {t:"p", v:"Le Tomcat vole très bien sur un moteur — le vrai danger est ailleurs : les moteurs sont très écartés, donc une poussée asymétrique à basse vitesse et forte incidence peut te mettre en lacet violent, jusqu'au départ. Réflexes : réduire l'incidence, compenser au palonnier, sécuriser le moteur mort (manette coupée, carburant fermé), et gérer le vol comme un avion en énergie limitée."},
  {t:"img", k:"lengine", c:"Paramètres moteur — identifie le moteur en cause avant de couper quoi que ce soit."},
  {t:"img", k:"oil", c:"Pressions d'huile — une chute lente ici annonce souvent la panne avant le voyant."},
  {t:"h", v:"Hydraulique, incendie, carburant"},
  {t:"table", head:["Panne","Le réflexe"], rows:[
   ["Incendie moteur","Manette du moteur coupée, carburant fermé, agent extincteur. Ne pas rallumer un moteur qui a brûlé."],
   ["Perte hydraulique","Surveiller l'autre circuit ; anticiper des commandes dégradées et un train à sortir en secours."],
   ["Fuite carburant","Calcul immédiat : autonomie restante contre distance du terrain le plus proche. La réponse décide du déroutement."]]},
  {t:"img", k:"hyd", c:"Pression hydraulique — deux circuits, tant qu'il en reste un, l'avion se pilote."},
  {t:"img", k:"fuel", c:"Gestion carburant — en fuite, c'est ici que se joue le calcul du retour."},
  {t:"h", v:"L'éjection"},
  {t:"p", v:"La décision se prend avant d'en avoir besoin : fixe-toi des seuils à froid (par exemple : avion incontrôlable sous une certaine altitude = éjection immédiate, sans débat). Rappelle-toi que tu commandes un équipage : l'éjection concerne les deux sièges."},
  {t:"img", k:"canopy", c:"Largage de verrière — connaître son emplacement avant d'en avoir besoin."},
  {t:"h", v:"Ce que tu fais maintenant"},
  {t:"proc", v:[
   "Mission d'entraînement avec pannes scriptées, ou pannes aléatoires activées.",
   "Panne moteur en croisière : sécurise, déroute, pose sur un moteur.",
   "Panne moteur au décollage — le cas le plus dangereux : décide vite entre continuer et s'arrêter.",
   "Fuite carburant en mission : fais le calcul de déroutement en vol, réellement.",
   "Note tes seuils d'éjection personnels et tes réflexes par panne."]},
  {t:"note", k:"warn", lbl:"Piège", v:"S'acharner à ramener un avion condamné. Un déroutement raté par orgueil coûte l'équipage entier."},
  {t:"note", k:"go", lbl:"Validation", v:"Tu poses l'avion avec un moteur en panne, terrain puis bateau si tu te sens prêt."},
  {t:"src", v:["manuel","chuck4"]}
]},

{id:"g2", title:"Ravitaillement en vol",
 intro:"Optionnel mais transformateur : le ravitaillement étend tes missions et forge une précision de pilotage qui améliore tout le reste, appontage compris. C'est aussi l'exercice le plus frustrant du module — préviens ton ego.",
 body:[
  {t:"h", v:"Les principes qui marchent"},
  {t:"proc", v:[
   "Perche sortie (jamais au-dessus de 350 kt perche sortie), rejoins le ravitailleur et stabilise-toi en position pré-contact.",
   "Demande le contact à la radio ; le panier se déploie.",
   "Approche à 2-3 kt de plus que le ravitailleur, pas davantage. <b>Ne regarde pas le panier</b> : prends un repère fixe sur le ravitailleur et vole ce repère.",
   "Trim en permanence. Un avion non trimé rend l'exercice impossible.",
   "Corrections minuscules, jamais combinées : tangage OU roulis OU poussée, pas les trois ensemble.",

const KEY="f14bu-cursus";
let st={done:{},notes:{}}, sIdx=0, lIdx=0;
async function load(){ const r=await __sget(KEY); if(r&&r.value){ try{st=Object.assign(st,JSON.parse(r.value));}catch(e){} } }
let tm=null;
function save(){ clearTimeout(tm); tm=setTimeout(()=>__sset(KEY,JSON.stringify(st)),400); }

function fig(k,c){
  const SEC=SECTIONS[sIdx], v=SEC.IMG[k]; let fn,id;
  if(Array.isArray(v)){fn=v[0];id=v[1];} else {id=v;fn=FN[id]||id;}
  return `<figure><img src="${LOCAL}${fn}" alt="${c}" loading="lazy"
      onerror="if(!this.dataset.f){this.dataset.f=1;this.src='${D(id)}';}else{this.closest('figure').classList.add('failed');}"
      onclick="openLb(this.src)">
    <div class="imgfail">Image non chargée — ouvre-la dans Drive via le lien ci-dessous.</div>
    <figcaption><span>${c}</span><a href="${V(id)}" target="_blank" rel="noopener">Drive ↗</a></figcaption></figure>`;
}
function table(h,rows){
  return `<table class="keytbl"><thead><tr>${h.map(x=>`<th>${x}</th>`).join("")}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
}
function block(b){
  if(b.t==="h")   return `<h3>${b.v}${b.badge?'<span class="badge" style="margin-left:8px;vertical-align:0">Nouveau</span>':''}</h3>`;
  if(b.t==="p")   return `<p>${b.v}</p>`;
  if(b.t==="img") return fig(b.k,b.c);
  if(b.t==="proc")return `<ol class="proc">${b.v.map(s=>`<li><span>${s}</span></li>`).join("")}</ol>`;
  if(b.t==="table")return table(b.head,b.rows);
  if(b.t==="pat") return `<div class="pat">${b.v}<div class="cap">${b.cap}</div></div>`;
  if(b.t==="note")return `<div class="note ${b.k||""}"><span class="lbl">${b.lbl}</span><p>${b.v}</p></div>`;
  if(b.t==="src"){
    const SEC=SECTIONS[sIdx];
    return `<h3>Sources dans ton Drive</h3><div class="srcs">${
      b.v.map(k=>`<a href="${V(SEC.DOC[k][1])}" target="_blank" rel="noopener">${SEC.DOC[k][0]} ↗</a>`).join("")}</div>`;
  }
  return "";
}
function totals(){
  let t=0,d=0;
  SECTIONS.forEach(S=>S.L.forEach(l=>{t++; if(st.done[l.id])d++;}));
  return [d,t];
}
function render(){
  const SEC=SECTIONS[sIdx], l=SEC.L[lIdx];
  const last = sIdx===SECTIONS.length-1 && lIdx===SEC.L.length-1;
  const first = sIdx===0 && lIdx===0;
  document.getElementById("main").innerHTML=`<div class="page">
    <div class="eyebrow">Section ${SEC.letter} · ${SEC.title} · leçon ${lIdx+1} sur ${SEC.L.length}</div>
    <h2>${l.title}${l.isNew?'<span class="badge">Nouveau sur le B(U)</span>':""}</h2>
    <p class="intro">${l.intro}</p>
    ${l.body.map(block).join("")}
    <h3>Tes notes de vol</h3>
    <textarea id="nt" placeholder="Procédures exactes, réglages, ce qui a coincé…">${(st.notes[l.id]||"").replace(/</g,"&lt;")}</textarea>
    <button class="doneline${st.done[l.id]?" on":""}" id="dn"><span class="box"></span>
      <span>${st.done[l.id]?"Leçon validée":"Marquer cette leçon comme validée"}</span></button>
    <div class="nav">
      <button class="ghost" id="pv"${first?" disabled style=opacity:.3":""}>← Précédent</button>
      <button class="ghost" id="nx"${last?" disabled style=opacity:.3":""}>Suivant →</button>
    </div></div>`;
  document.getElementById("nt").oninput=e=>{st.notes[l.id]=e.target.value;save();};
  document.getElementById("dn").onclick=()=>{st.done[l.id]=!st.done[l.id];save();render();};
  if(!first) document.getElementById("pv").onclick=()=>{ if(lIdx>0)lIdx--; else {sIdx--;lIdx=SECTIONS[sIdx].L.length-1;} render(); window.scrollTo(0,0); };
  if(!last)  document.getElementById("nx").onclick=()=>{ if(lIdx<SEC.L.length-1)lIdx++; else {sIdx++;lIdx=0;} render(); window.scrollTo(0,0); };
  rail();
}
function rail(){
  const r=document.getElementById("rail"); r.innerHTML="";
  SECTIONS.forEach((S,i)=>{
    const h=document.createElement("div");
    h.className="phase-hd"; h.innerHTML=`<span>${S.letter} · ${S.title}</span><span class="rule"></span>`;
    r.appendChild(h);
    S.L.forEach((l,j)=>{
      const b=document.createElement("button");
      b.className="item"+(i===sIdx&&j===lIdx?" on":"")+(st.done[l.id]?" done":"");
      b.innerHTML=`<span class="idx">${st.done[l.id]?"✓":String(j+1).padStart(2,"0")}</span><span class="nm">${l.title}</span>`;
      b.onclick=()=>{sIdx=i;lIdx=j;render();window.scrollTo(0,0);};
      r.appendChild(b);
    });
  });
  const [d,t]=totals(), pc=t?Math.round(d/t*100):0;
  document.getElementById("gfill").style.width=pc+"%";
  document.getElementById("gpct").textContent=pc+" %";
  document.getElementById("gcnt").textContent=`${d} / ${t} leçons`;
  document.getElementById("foot").textContent=`Section en cours : ${SECTIONS[sIdx].letter} — ${SECTIONS[sIdx].title}`;
}
function openLb(src){document.getElementById("lbimg").src=src;document.getElementById("lb").classList.add("on");}
document.getElementById("lb").onclick=()=>document.getElementById("lb").classList.remove("on");
document.addEventListener("keydown",e=>{
  if(e.key==="Escape") document.getElementById("lb").classList.remove("on");
  if(e.target.matches("textarea")) return;
  const SEC=SECTIONS[sIdx];
  if(e.key==="ArrowRight"&&!(sIdx===SECTIONS.length-1&&lIdx===SEC.L.length-1)){ if(lIdx<SEC.L.length-1)lIdx++; else {sIdx++;lIdx=0;} render(); }
  if(e.key==="ArrowLeft"&&!(sIdx===0&&lIdx===0)){ if(lIdx>0)lIdx--; else {sIdx--;lIdx=SECTIONS[sIdx].L.length-1;} render(); }
});
load().then(render);
</script>
</body></html>
